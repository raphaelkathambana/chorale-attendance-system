// ═══════════════════════════════════════════════════════════════════════════
//  PHASE 4 · SESSIONS + GROUP DASHBOARD · CLIENT LOGIC
//  google.script.run calls + payload shapes are verbatim (match Code.gs).
//  Emitted HTML reconciled to the Page.html static-demo class names.
// ═══════════════════════════════════════════════════════════════════════════
var sessionsLoaded = false, dashboardLoaded = false;
var sessDetailActive = false;             // true while a session register is open (shares View & Edit state)
var sessCurrent = null;                 // currently-open session detail
var SESS_ORDER = ["Present", "Late Excused", "Late Unexcused", "Absent Excused", "Absent Unexcused"];
var SESS_ABBR  = { "Present": "P", "Late Excused": "LE", "Late Unexcused": "LU", "Absent Excused": "AE", "Absent Unexcused": "AU" };
var SESS_VAR   = { "Present": "var(--present)", "Late Excused": "var(--late-exc)", "Late Unexcused": "var(--late-unexc)", "Absent Excused": "var(--absent-exc)", "Absent Unexcused": "var(--absent-unexc)" };

// ---------- SESSIONS TAB ----------
function loadSessions() {
  var mount = document.getElementById("sessionsList");
  if (!mount) return;
  sessShowList();
  mount.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading sessions\u2026</div></div>';
  var filters = (typeof sessGetFilters === "function") ? sessGetFilters() : { range: "month", section: "All", type: "all" };
  google.script.run
    .withSuccessHandler(renderSessionsList)
    .withFailureHandler(function (e) { mount.innerHTML = '<p class="loading">Error: ' + esc(e.message) + '</p>'; })
    .getSessionsList(filters);
}
function sessFiltersChanged() { loadSessions(); }

// "2026-06-10" → { dow:"WED", day:"10", mon:"JUN" }
function sessDateParts_(ds) {
  var p = String(ds).split("-");
  var dt = new Date(p[0], (p[1] || 1) - 1, p[2] || 1);
  return {
    dow: ["SUN","MON","TUE","WED","THU","FRI","SAT"][dt.getDay()] || "",
    day: p[2] || "",
    mon: ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"][(p[1] || 1) - 1] || ""
  };
}
// proportional status bar + legend → .ministat-bar / .ministat-legend
function ministatHtml_(counts) {
  counts = counts || {};
  var bar = "", legend = "";
  for (var i = 0; i < SESS_ORDER.length; i++) {
    var st = SESS_ORDER[i], n = counts[st] || 0;
    if (n > 0) bar += '<span class="ministat-seg" style="flex:' + n + ';background:' + SESS_VAR[st] + '"></span>';
    legend += '<span class="ministat-leg' + (n ? '' : ' zero') + '"><span class="sw" style="background:' + SESS_VAR[st] + '"></span><span class="ab">' + SESS_ABBR[st] + '</span><span class="ct">' + n + '</span></span>';
  }
  return '<div class="ministat-bar">' + bar + '</div><div class="ministat-legend">' + legend + '</div>';
}

function renderSessionsList(list) {
  var mount = document.getElementById("sessionsList");
  if (!mount) return;
  if (!list || !list.length) { mount.innerHTML = '<div class="empty-pane">No sessions in this range.</div>'; return; }
  var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
        +   '<div class="eyebrow">' + list.length + ' session' + (list.length === 1 ? '' : 's') + '</div>'
        +   '<span style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-400);letter-spacing:.1em">NEWEST FIRST</span>'
        + '</div>';
  for (var i = 0; i < list.length; i++) {
    var s = list[i], dp = sessDateParts_(s.date), meeting = s.type === "Meeting";
    var groups = (s.groups || []).map(function (g) { return '<span class="grp-chip">' + esc(g.toUpperCase()) + '</span>'; }).join("");
    var apol = s.apologyCount > 0 ? '<span class="apol">\u2709 ' + s.apologyCount + ' APOLOG' + (s.apologyCount === 1 ? 'Y' : 'IES') + '</span>' : '';
    var rec = (s.recordedBy && s.recordedBy.length) ? '<span>REC \u00b7 ' + esc(s.recordedBy.join(", ").toUpperCase()) + '</span>' : '';
    h += '<div class="session-card" onclick="openSession(\'' + s.date + '\',\'' + jsAttr(s.sessionKey) + '\')">'
      +    '<div class="sess-datebox"><div class="sess-dow">' + dp.dow + '</div><div class="sess-daynum">' + dp.day + '</div><div class="sess-mon">' + dp.mon + '</div></div>'
      +    '<div class="sess-body">'
      +      '<div class="sess-cardhead"><span class="type-badge' + (meeting ? ' meeting' : '') + '">' + (meeting ? 'MEETING' : 'PRACTICE') + '</span><span class="grp-chips">' + groups + '</span></div>'
      +      '<div class="sess-title">' + esc(s.title || (meeting ? "Meeting" : "Practice")) + '</div>'
      +      '<div class="sess-recmeta">' + rec + apol + '</div>'
      +    '</div>'
      +    '<div class="sess-breakdown">' + ministatHtml_(s.counts) + '</div>'
      +    '<div class="sess-rateblock"><div><div class="sess-rate-num">' + s.attendanceRate + '%</div><div class="sess-rate-label">' + s.attended + '/' + s.total + ' HERE</div></div><span class="sess-chev">\u203a</span></div>'
      +  '</div>';
  }
  mount.innerHTML = h;
}

// Session-detail records carry no profile photo (backend getSessionDetail omits it),
// so we keep a name→photo map, sourced from getMemberList (reused if already loaded).
var memberPhotoMap = null;
function ensureMemberPhotos(cb) {
  if (memberPhotoMap) { cb(); return; }
  function build(list) {
    memberPhotoMap = {};
    (list || []).forEach(function (m) { if (m && m.name) memberPhotoMap[m.name] = m.profilePhoto || ""; });
    cb();
  }
  if (memberListData && memberListData.length) { build(memberListData); return; }
  google.script.run
    .withSuccessHandler(function (list) { memberListData = list || memberListData; build(list); })
    .withFailureHandler(function () { memberPhotoMap = {}; cb(); })
    .getMemberList();
}

// (data-wiring verbatim)
function openSession(dateStr, sessionKey) {
  var mount = document.getElementById("sessionDetail");
  if (mount) mount.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading\u2026</div></div>';
  if (typeof sessShowDetail === "function") sessShowDetail();
  ensureMemberPhotos(function () {
    google.script.run
      .withSuccessHandler(renderSessionDetail)
      .withFailureHandler(function (e) { if (mount) mount.innerHTML = '<p class="loading">Error: ' + esc(e.message) + '</p>'; })
      .getSessionDetail(dateStr, sessionKey);
  });
}

// Fresh load: adopt the shared edit-state machinery (same as View & Edit) so the
// session register gets role-grouped columns, the EDITED glow, and the floating
// unsaved-changes tray — no persistent "Save changes" button.
function renderSessionDetail(d) {
  sessCurrent = d;
  viewRecords = d.records || [];
  viewCurrentDate = d.date;
  viewGroup = (d.groups && d.groups.length === 1) ? d.groups[0] : "All";
  viewOriginalStatuses = {};
  viewEditedStatuses = {};
  for (var i = 0; i < viewRecords.length; i++) viewOriginalStatuses[viewRecords[i].rowIndex] = viewRecords[i].status;
  sessDetailActive = true;
  if (typeof sessShowDetail === "function") sessShowDetail();
  paintSessionDetail();
}

function sessRoleTint(role, group) {
  return { Soprano: '#F3E9CE', Alto: '#F0E0CE', Tenor: '#ECE7DE', Bass: '#E1ECDF' }[role]
      || { Choir: '#F3E9CE', Band: '#F0E0CE', Orchestra: '#E1ECDF' }[group]
      || 'var(--paper-200)';
}

// Re-render the open session from current state (original + in-flight edits). Called on
// every status change so the tally, EDITED glow and changes-bar stay in sync.
function paintSessionDetail() {
  var d = sessCurrent;
  var mount = document.getElementById("sessionDetail");
  if (!d || !mount) return;
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;

  // Live tally from the current (possibly edited) statuses
  var counts = {}, attended = 0, total = viewRecords.length;
  for (var i = 0; i < viewRecords.length; i++) {
    var cur = viewEditedStatuses[viewRecords[i].rowIndex] || viewRecords[i].status;
    counts[cur] = (counts[cur] || 0) + 1;
    if (cur === "Present" || cur === "Late Excused" || cur === "Late Unexcused") attended++;
  }
  var rate = total ? Math.round(attended / total * 100) : 0;
  var cells = "";
  for (var s = 0; s < SESS_ORDER.length; s++) {
    var stt = SESS_ORDER[s];
    cells += '<div class="sess-tally-cell"><div class="lab"><span class="dot" style="background:' + SESS_VAR[stt] + '"></span><span class="ab">' + SESS_ABBR[stt] + '</span></div><div class="num">' + (counts[stt] || 0) + '</div></div>';
  }

  // Register grouped by ensemble → role, 2-col on desktop, with EDITED glow
  var byEns = {};
  for (var r = 0; r < viewRecords.length; r++) { var rc = viewRecords[r]; (byEns[rc.group] = byEns[rc.group] || []).push(rc); }
  var ensKeys = Object.keys(byEns).sort();
  var multiEns = ensKeys.length > 1;
  var reg = isDesktop ? '<div class="view-detail-grid">' : '';
  for (var ei = 0; ei < ensKeys.length; ei++) {
    var en = ensKeys[ei];
    if (multiEns) reg += '<div class="ensemble-header"><span>' + esc(en) + '</span></div>';
    var rm = {};
    for (var k = 0; k < byEns[en].length; k++) { var rl = byEns[en][k].role || "Other"; (rm[rl] = rm[rl] || []).push(byEns[en][k]); }
    var rk = Object.keys(rm).sort(function (a, b) { return a === "Other" ? 1 : b === "Other" ? -1 : a.localeCompare(b); });
    for (var ki = 0; ki < rk.length; ki++) {
      var recs = rm[rk[ki]];
      reg += '<div class="role-group"><div class="role-group-header"><span>' + esc(rk[ki]) + '</span><span class="role-group-count">' + recs.length + '</span></div>';
      for (var mi = 0; mi < recs.length; mi++) {
        var rec = recs[mi];
        var cur2 = viewEditedStatuses[rec.rowIndex] || rec.status;
        var edited = viewEditedStatuses[rec.rowIndex] && viewEditedStatuses[rec.rowIndex] !== viewOriginalStatuses[rec.rowIndex];
        var initial = (rec.name || '\u00b7').trim().charAt(0).toUpperCase();
        var photo = (memberPhotoMap && memberPhotoMap[rec.name]) || rec.profilePhoto || "";
        reg += '<div class="member-row' + (edited ? ' row-edited' : '') + '">'
          +    '<span class="member-name">' + memberAvatar(photo, initial, { size: 26, font: 11, bg: sessRoleTint(rec.role, en) })
          +      esc(rec.name) + (edited ? ' <span class="edited-badge">EDITED</span>' : '') + '</span>'
          +    '<div class="status-five">'
          +      fiveBtn(rec.rowIndex, "P",  "Present",          cur2)
          +      fiveBtn(rec.rowIndex, "LE", "Late Excused",     cur2)
          +      fiveBtn(rec.rowIndex, "LU", "Late Unexcused",   cur2)
          +      fiveBtn(rec.rowIndex, "AE", "Absent Excused",   cur2)
          +      fiveBtn(rec.rowIndex, "AU", "Absent Unexcused", cur2)
          +    '</div>'
          + '</div>';
      }
      reg += '</div>';
    }
  }
  if (isDesktop) reg += '</div>';

  var groupsTxt = (d.groups || []).join(" \u00b7 ");
  mount.innerHTML = ''
    + '<button class="back-btn" onclick="closeSession()">\u2190 All sessions</button>'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px">'
    +   '<div><div class="eyebrow">' + esc(groupsTxt.toUpperCase()) + '</div><h2 style="margin-top:4px">' + formatDateDisplay(d.date) + '</h2>'
    +     '<div style="font-family:var(--f-mono);font-size:10.5px;color:var(--ink-500);letter-spacing:.08em;margin-top:6px">' + (d.recordedBy && d.recordedBy.length ? 'REC \u00b7 ' + esc(d.recordedBy.join(", ").toUpperCase()) : '') + '</div></div>'
    +   '<button class="btn-export" onclick="exportThisSession()">Export \u00b7 CSV</button>'
    + '</div>'
    + '<div class="sess-tally"><div><div class="sess-tally-rate-label">ATTENDANCE</div><div class="sess-tally-rate">' + rate + '%</div></div>'
    +   '<div class="sess-tally-div"></div><div class="sess-tally-counts">' + cells + '</div>'
    +   '<div style="flex:1"></div><div style="text-align:right"><div class="sess-tally-rate-label">APOLOGIES</div><div class="num" style="font-family:var(--f-display);font-size:28px;color:var(--paper);margin-top:4px">' + (d.apologyCount || 0) + '</div></div>'
    + '</div>'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div class="eyebrow">Register \u00b7 ' + total + ' members</div><span style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-400);letter-spacing:.1em">TAP A STATUS TO CORRECT</span></div>'
    + reg;
  updateChangesBar();
}

// Leave the open session — drop any unsaved edits and return to the list.
function closeSession() {
  sessDetailActive = false;
  viewEditedStatuses = {};
  hideChangesBar();
  if (typeof sessShowList === "function") sessShowList();
}

// (data-wiring verbatim)
function exportThisSession() {
  if (!sessCurrent) return;
  google.script.run
    .withSuccessHandler(function (csv) { downloadCSV_(csv, "session-" + sessCurrent.date + ".csv"); })
    .withFailureHandler(function (e) { showToast("Export failed: " + e.message, "error"); })
    .exportSessionCSV(sessCurrent.date, sessCurrent.sessionKey);
}

// (data-wiring verbatim)
function exportSessionsList() {
  var filters = (typeof sessGetFilters === "function") ? sessGetFilters() : { range: "month", section: "All", type: "all" };
  google.script.run
    .withSuccessHandler(function (csv) { downloadCSV_(csv, "sessions.csv"); })
    .withFailureHandler(function (e) { showToast("Export failed: " + e.message, "error"); })
    .exportSessionsListCSV(filters);
}

// ---------- GROUP DASHBOARD ----------
function loadGroupDashboard() {
  var opts = (typeof dashGetOpts === "function") ? dashGetOpts() : { section: "All", range: "month" };
  var body = document.getElementById("dashboardBody");
  if (body) body.style.opacity = "0.5";
  google.script.run
    .withSuccessHandler(function (d) { if (body) body.style.opacity = "1"; renderGroupDashboard(d); })
    .withFailureHandler(function (e) { if (body) body.style.opacity = "1"; showToast("Dashboard error: " + e.message, "error"); })
    .getGroupDashboard(opts);
}
function dashFiltersChanged() { loadGroupDashboard(); }

function dashStatCard_(label, n, total, color) {
  var pct = total ? Math.round(n / total * 100) : 0;
  return '<div class="dash-stat"><div class="dash-stat-head"><span class="dot" style="background:' + color + '"></span><span class="eyebrow" style="font-size:9.5px">' + label + '</span></div>'
       + '<div class="dash-stat-num">' + n + '</div><div class="dash-stat-sub">' + pct + '% OF RECORDS</div></div>';
}

function renderGroupDashboard(d) {
  var sc = d.statusCounts || {};
  var present = sc["Present"] || 0,
      late = (sc["Late Excused"] || 0) + (sc["Late Unexcused"] || 0);
  var total = d.totalRecords || 1;
  var sectionLabel = (d.section && d.section !== "All") ? d.section : "All sections";
  var sessN = (d.sessionsCount != null) ? d.sessionsCount : (d.trend ? d.trend.length : 0);

  // Hero (momentum tag filled by renderDashMomentum) + per-session averages
  // (renderDashAverages fills #dashAverages — averages REPLACE the raw totals).
  var rateEl = document.getElementById("dashRate");
  if (rateEl) rateEl.innerHTML =
      '<div class="dash-hero"><div class="dash-hero-eyebrow">' + esc(sectionLabel.toUpperCase()) + ' \u00b7 ATTENDANCE RATE</div>'
    +   '<div class="dash-hero-num">' + d.overallRate + '%</div>'
    +   '<div class="dash-hero-delta" id="dashMomentum"></div>'
    +   '<div class="dash-hero-sub">' + (present + late) + ' of ' + total + ' records present \u00b7 ' + sessN + ' sessions in range</div></div>'
    + '<div id="dashAverages" style="display:contents"></div>';

  // Trend chart (SVG) — data: d.trend = [{date, rate}]
  drawTrendChart(d.trend);

  // At-Risk panel
  var risk = document.getElementById("dashAtRisk");
  if (risk) {
    var rows = "";
    (d.nearAU || []).forEach(function (m) {
      var dots = (m.lastSessions || []).map(function (ls) {
        return '<span class="status-dot ' + statusDotClass_(ls.status) + '" title="' + esc(ls.date + ': ' + ls.status) + '"></span>';
      }).join("");
      rows += '<div class="atrisk-row"><div class="atrisk-info"><div class="atrisk-name">' + esc(m.name) + '</div>'
           +    '<div class="atrisk-meta">' + esc((m.groups || []).join(" \u00b7 ").toUpperCase()) + '</div></div>'
           +    '<div class="atrisk-dots">' + dots + '</div>'
           +    '<span class="atrisk-badge">' + m.consecutiveAU + '\u00d7 AU</span></div>';
    });
    if (!rows) rows = '<div class="atrisk-row" style="color:var(--ink-400);justify-content:center">No members at risk in this range.</div>';
    risk.innerHTML = '<div class="dash-panel-head"><div><div class="eyebrow" style="color:var(--crimson-600)">At risk \u00b7 early warning</div>'
      + '<div style="font-size:11.5px;color:var(--ink-500);margin-top:4px">2+ unexcused absences in a row \u2014 before the 3-AU penalty fires.</div></div>'
      + '<span class="big" style="color:var(--crimson-600)">' + ((d.nearAU || []).length) + '</span></div>' + rows;
  }

  // Probation panel
  var prob = document.getElementById("dashProbation");
  if (prob) {
    var fb = d.probationFallingBehind || [];
    var minis = '<div class="prob-summary"><div class="prob-mini gold"><div class="num">' + d.probationCount + '</div><div class="lab">On probation</div></div>'
              + '<div class="prob-mini ok"><div class="num">' + d.probationOnTrack + '</div><div class="lab">On track</div></div>'
              + '<div class="prob-mini bad"><div class="num">' + fb.length + '</div><div class="lab">Behind</div></div></div>';
    var list = "";
    if (fb.length) {
      list = '<div style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-400);letter-spacing:.1em;margin-bottom:8px">FALLING BEHIND</div>';
      fb.forEach(function (p) {
        // Segmented per-session bar (same design as the Probation tab) — probSegBar
        // falls back to plain fill when sessionSequence is absent.
        list += '<div class="prob-fall-row"><div style="flex:1"><div style="font-size:13px;font-weight:600;color:var(--ink)">' + esc(p.name) + '</div>'
             +    '<div class="prob-seg">' + probSegBar(p, 6) + '</div></div>'
             +    '<span style="font-family:var(--f-mono);font-size:12px;font-weight:600;color:var(--crimson-600)">' + p.rate + '%</span></div>';
      });
    }
    prob.innerHTML = '<div class="eyebrow" style="margin-bottom:14px">Probation \u00b7 in this section</div>' + minis + list;
  }

  // v2 panels — averages strip, momentum indicator, apology analytics
  renderDashAverages(d);
  renderDashMomentum(d);
  renderDashApologies(d);
}

// green=Present, yellow=Late(both), grey=Absent Excused, red=Absent Unexcused → my CSS modifiers
function statusDotClass_(status) {
  if (status === "Present") return "present";
  if (status === "Late Excused" || status === "Late Unexcused") return "late";
  if (status === "Absent Excused") return "abs-exc";
  if (status === "Absent Unexcused") return "abs-unexc";
  return "abs-exc";
}

// ---------- v2: averages · momentum · apology analytics ----------
// Headcounts on an AVERAGE session — these replace the raw totals in the top stat cards.
// Backend sends 1-decimal averages; we round for display (whole people are easier to read).
function renderDashAverages(d) {
  var el = document.getElementById("dashAverages");
  if (!el) return;
  var a = d.avgPerSession || {};
  var rnd = function (v) { return Math.round(v || 0); };
  var absent = rnd((a.absentExcused || 0) + (a.absentUnexcused || 0));
  el.innerHTML =
      '<div class="dash-stat"><div class="dash-stat-head"><span class="dot" style="background:var(--present)"></span><span class="eyebrow" style="font-size:9.5px">Present</span></div>'
    +   '<div class="dash-stat-num">' + rnd(a.present) + '</div><div class="dash-stat-sub">AVG / SESSION \u00b7 ' + rnd(a.attended) + ' ATTENDED</div></div>'
    + '<div class="dash-stat"><div class="dash-stat-head"><span class="dot" style="background:var(--late-exc)"></span><span class="eyebrow" style="font-size:9.5px">Late</span></div>'
    +   '<div class="dash-stat-num">' + rnd(a.late) + '</div><div class="dash-stat-sub">AVG / SESSION</div></div>'
    + '<div class="dash-stat"><div class="dash-stat-head"><span class="dot" style="background:var(--absent-unexc)"></span><span class="eyebrow" style="font-size:9.5px">Absent</span></div>'
    +   '<div class="dash-stat-num">' + absent + '</div><div class="dash-stat-sub">' + rnd(a.absentExcused) + ' AE \u00b7 ' + rnd(a.absentUnexcused) + ' AU'
    +     (d.absenteeismRate != null ? ' \u00b7 ' + d.absenteeismRate + '% OF RECORDS' : '') + '</div></div>';
}

// "\u25b2 +6% improving / \u25bc declining / \u25ac flat" — second half of the range vs the first.
function renderDashMomentum(d) {
  var el = document.getElementById("dashMomentum");
  if (!el || !d.momentum) return;
  var m = d.momentum;
  var arrow = m.direction === "improving" ? "\u25b2" : (m.direction === "declining" ? "\u25bc" : "\u25ac");
  var cls = m.direction === "declining" ? " down" : (m.direction === "flat" ? " flat" : "");
  el.innerHTML = '<span class="tag' + cls + '">' + arrow + ' ' + (m.delta > 0 ? "+" : "") + m.delta + '%</span>'
    + '<span style="font-size:11px;color:var(--ink-300)">second half vs first (' + m.firstHalfRate + '% \u2192 ' + m.secondHalfRate + '%)</span>';
}

// Apology analytics for the range — dark card with a header (matches the tally-strip design).
function renderDashApologies(d) {
  var el = document.getElementById("dashApologies");
  if (!el || !d.apologyStats) return;
  var s = d.apologyStats;
  el.innerHTML =
      '<div class="apol-head">APOLOGIES \u00b7 IN RANGE</div>'
    + '<div class="apol-row">'
    +   '<div class="apol-cell lead"><span class="num gold">' + s.total + '</span><span class="lab">Total received</span></div>'
    +   '<span class="apol-div"></span>'
    +   '<div class="apol-cell"><span class="num">' + s.absentType + '<span class="sep">/</span>' + s.lateType + '</span><span class="lab">Absence \u00b7 lateness</span></div>'
    +   '<span class="apol-div"></span>'
    +   '<div class="apol-cell"><span class="num">' + s.onTime + '<span class="sep">/</span>' + s.lateSubmission + '</span><span class="lab">On time \u00b7 late subm.</span></div>'
    +   '<span class="apol-div"></span>'
    +   '<div class="apol-cell"><span class="num ok">' + s.approved + '</span><span class="lab">Approved</span></div>'
    +   '<div class="apol-cell"><span class="num">' + s.pending + '</span><span class="lab">Pending</span></div>'
    +   '<div class="apol-cell"><span class="num bad">' + s.rejected + '</span><span class="lab">Rejected</span></div>'
    + '</div>';
}

// SVG area+line chart into #dashTrend (v2: hover any point for that session's full tally).
function trendXLabel_(ds) {
  var p = String(ds).split("-");
  if (p.length === 3) { var dp = sessDateParts_(ds); return dp.day + " " + dp.mon; }
  return String(ds).toUpperCase();
}
function drawTrendChart(trend) {
  var host = document.getElementById("dashTrend");
  if (!host) return;
  if (!trend || !trend.length) { host.innerHTML = '<div class="empty-pane">No data in range.</div>'; return; }
  host.style.position = "relative";
  var W = 760, H = 220, padL = 34, padR = 14, padT = 14, padB = 26, n = trend.length;
  var iw = W - padL - padR, ih = H - padT - padB;
  function x(i) { return padL + (n === 1 ? iw / 2 : i / (n - 1) * iw); }
  function y(r) { return padT + (1 - r / 100) * ih; }
  var line = trend.map(function (t, i) { return x(i) + "," + y(t.rate); }).join(" ");
  var area = "M " + x(0) + "," + y(trend[0].rate) + " " + trend.map(function (t, i) { return "L " + x(i) + "," + y(t.rate); }).join(" ") + " L " + x(n - 1) + "," + (padT + ih) + " L " + x(0) + "," + (padT + ih) + " Z";
  var grid = [0, 25, 50, 75, 100].map(function (g) {
    return '<line x1="' + padL + '" y1="' + y(g) + '" x2="' + (W - padR) + '" y2="' + y(g) + '" stroke="#E8DEC6" stroke-width="1"' + (g ? ' stroke-dasharray="3 4"' : '') + '></line>'
         + ((g % 50 === 0) ? '<text x="' + (padL - 8) + '" y="' + (y(g) + 3) + '" text-anchor="end" font-family="monospace" font-size="9" fill="#8C8478">' + g + '</text>' : '');
  }).join("");
  var dots = trend.map(function (t, i) {
    var lastp = i === n - 1;
    return '<circle cx="' + x(i) + '" cy="' + y(t.rate) + '" r="' + (lastp ? 4.5 : 2.8) + '" fill="' + (lastp ? '#B08538' : '#FBF7EE') + '" stroke="#B08538" stroke-width="2"></circle>';
  }).join("");
  // invisible, larger hover targets carrying the point index (v2 tooltip)
  var hits = trend.map(function (t, i) {
    return '<circle cx="' + x(i) + '" cy="' + y(t.rate) + '" r="11" fill="transparent" style="cursor:pointer" data-i="' + i + '" class="trend-hit"></circle>';
  }).join("");
  var xlabels = trend.map(function (t, i) {
    return (i % 2 === 0 || i === n - 1) ? '<text x="' + x(i) + '" y="' + (H - 8) + '" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#8C8478">' + esc(trendXLabel_(t.date)) + '</text>' : '';
  }).join("");
  var last = trend[n - 1];
  host.innerHTML = '<svg class="trend-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="none">'
    + '<defs><linearGradient id="trendFillLive" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#B08538" stop-opacity="0.22"></stop><stop offset="100%" stop-color="#B08538" stop-opacity="0"></stop></linearGradient></defs>'
    + grid
    + '<path d="' + area + '" fill="url(#trendFillLive)"></path>'
    + '<polyline points="' + line + '" fill="none" stroke="#B08538" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>'
    + dots + hits + xlabels
    + '<text x="' + x(n - 1) + '" y="' + (y(last.rate) - 12) + '" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#14110F">' + last.rate + '%</text>'
    + '</svg>'
    + '<div id="trendTip" class="trend-tip" style="display:none;position:absolute;pointer-events:none;z-index:5;"></div>';

  var tip = document.getElementById("trendTip");
  var hitEls = host.querySelectorAll(".trend-hit");
  function fmtDate(ds) {
    try { var p = String(ds).split("-"); if (p.length === 3) return new Date(p[0], p[1] - 1, p[2]).toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short" }); return ds; }
    catch (e) { return ds; }
  }
  for (var h = 0; h < hitEls.length; h++) {
    hitEls[h].addEventListener("mouseenter", function (ev) {
      var t = trend[parseInt(this.getAttribute("data-i"), 10)];
      tip.innerHTML =
        '<div class="tip-date">' + fmtDate(t.date) + '</div>' +
        '<div class="tip-rate">' + t.rate + '% attendance</div>' +
        '<div class="tip-count">' + (t.attended || 0) + ' of ' + (t.total || 0) + ' attended</div>' +
        '<div class="tip-break">' +
          '<span class="tip-p">' + (t.present || 0) + ' P</span> \u00b7 ' +
          '<span class="tip-l">' + (t.late || 0) + ' L</span> \u00b7 ' +
          '<span class="tip-ae">' + (t.ae || 0) + ' AE</span> \u00b7 ' +
          '<span class="tip-au">' + (t.au || 0) + ' AU</span>' +
        '</div>';
      tip.style.display = "block";
      // position near the hovered point; flip to the LEFT of the pointer for
      // right-edge points so the box never covers what's plotted at the edge
      var rect = host.getBoundingClientRect();
      var cx = ev.clientX - rect.left, cy = ev.clientY - rect.top;
      var tw = tip.offsetWidth || 150;
      var left = cx + 12;
      if (left + tw > rect.width - 4) left = cx - 12 - tw;
      left = Math.max(left, 4);
      var top = Math.max(cy - 70, 4);
      tip.style.left = left + "px"; tip.style.top = top + "px";
    });
    hitEls[h].addEventListener("mouseleave", function () { tip.style.display = "none"; });
  }
}

// ---------- shared helpers (esc + showToast already exist in Scripts) ----------
function jsAttr(s) { return String(s).replace(/'/g, "\\'").replace(/"/g, "&quot;"); }
function downloadCSV_(csv, filename) {
  var blob = new Blob([csv], { type: "text/csv" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

var members = [], attendance = {}, selectedGroups = [], sessionApologies = {};

function getSelectedGroups() {
  var result = [];
  if (document.getElementById("grpChoir").checked)     result.push("Choir");
  if (document.getElementById("grpBand").checked)      result.push("Band");
  if (document.getElementById("grpOrchestra").checked) result.push("Orchestra");
  return result;
}

function onDateChange()      { refreshSessionTime(); }
function onGroupCheckChange(){ refreshSessionTime(); }
function onSessionTypeChange() {
  var isMeeting = document.getElementById("sessionType").value === "meeting";
  var wrap = document.getElementById("meetingPickerWrap");
  if (wrap) wrap.style.display = isMeeting ? "block" : "none";
  if (isMeeting) loadMeetingPicker();
  refreshSessionTime();
}

// Record tab — meeting picker dropdown. Lists upcoming scheduled meetings;
// picking one loads the whole session (date, groups, time, members).
function loadMeetingPicker() {
  var sel = document.getElementById("meetingPicker");
  if (!sel) return;
  sel.innerHTML = '<option value="">Loading meetings…</option>';
  google.script.run.withSuccessHandler(function (meetings) {
    if (!meetings || !meetings.length) {
      sel.innerHTML = '<option value="">No upcoming meetings — enter details manually</option>';
      return;
    }
    window._meetingCache = {};
    var h = '<option value="">Select a scheduled meeting…</option>';
    for (var i = 0; i < meetings.length; i++) {
      var m = meetings[i];
      var key = (m.id != null ? m.id : i);
      window._meetingCache[key] = m;
      var grps = (m.groups && m.groups.length) ? " (" + m.groups.join(", ") + ")" : "";
      h += '<option value="' + esc(String(key)) + '">'
         + esc(m.title || "Meeting") + ' — ' + esc(fmtDayMon(m.date)) + ' ' + esc(fmtTime12(m.time)) + grps
         + '</option>';
    }
    sel.innerHTML = h;
  }).withFailureHandler(function () {
    sel.innerHTML = '<option value="">Couldn\u2019t load meetings</option>';
  }).getMeetings();
}

// Picking a meeting auto-fills date, groups, time + note, then loads the member list.
function onMeetingPicked() {
  var sel = document.getElementById("meetingPicker");
  var key = sel.value;
  if (!key || !window._meetingCache || !window._meetingCache[key]) return;
  var m = window._meetingCache[key];

  document.getElementById("attendanceDate").value = m.date || "";

  var mg = m.groups || [];
  document.getElementById("grpChoir").checked     = mg.indexOf("Choir") !== -1;
  document.getElementById("grpBand").checked      = mg.indexOf("Band") !== -1;
  document.getElementById("grpOrchestra").checked = mg.indexOf("Orchestra") !== -1;

  var timeEl = document.getElementById("sessionTime");
  if (timeEl) timeEl.value = m.time || "";
  var noteEl = document.getElementById("timeNote");
  if (noteEl) noteEl.textContent = "MEETING · " + String(m.title || "").toUpperCase();

  // Load the member list for the chosen groups (reuses the Record-tab flow).
  if (getSelectedGroups().length) onGroupChange();
}

// Route the time field to the right source for the chosen session type.
function refreshSessionTime() {
  var st = document.getElementById("sessionType");
  if (st && st.value === "meeting") applyMeetingAutofill();
  else lookupScheduleTime();
}

function lookupScheduleTime() {
  var ds = document.getElementById("attendanceDate").value;
  var grps = getSelectedGroups();
  var isMeeting = document.getElementById("sessionType").value === "meeting";
  if (isMeeting || !ds || grps.length === 0) return;
  google.script.run.withSuccessHandler(function (info) {
    if (info.found) {
      document.getElementById("sessionTime").value = info.time;
      document.getElementById("timeNote").textContent = "FROM SCHEDULE · " + info.dayName.toUpperCase();
    } else {
      document.getElementById("sessionTime").value = "";
      document.getElementById("timeNote").textContent = "NO SCHEDULE FOR " + info.dayName.toUpperCase();
    }
  }).withFailureHandler(function () {}).getSessionTime(ds, grps);
}

// ── Meetings (one-off sessions) ───────────────────────────────────────────
var scheduledMeetings = [];

// Find a scheduled meeting for a date that overlaps the chosen groups (any if none chosen).
function findScheduledMeeting(ds, grps) {
  for (var i = 0; i < scheduledMeetings.length; i++) {
    var m = scheduledMeetings[i];
    if (m.date !== ds) continue;
    if (!grps || !grps.length) return m;
    var mg = m.groups || [];
    for (var j = 0; j < grps.length; j++) if (mg.indexOf(grps[j]) !== -1) return m;
  }
  return null;
}

// Record tab “Meeting” auto-fill — time + note come from a matching scheduled meeting.
function applyMeetingAutofill() {
  var timeEl = document.getElementById("sessionTime");
  var noteEl = document.getElementById("timeNote");
  if (!timeEl || !noteEl) return;
  var ds = document.getElementById("attendanceDate").value;
  var m = ds ? findScheduledMeeting(ds, getSelectedGroups()) : null;
  if (m) {
    timeEl.value = m.time || "";
    noteEl.textContent = "MEETING · " + String(m.title || "").toUpperCase();
  } else {
    if (!timeEl.value) timeEl.value = "";
    noteEl.textContent = "ENTER MEETING TIME";
  }
}

function onMeetingPanelToggle() {
  var p = document.getElementById("meetingPanel");
  if (p && p.open) loadMeetings();
}

function loadMeetings() {
  var c = document.getElementById("meetingsList");
  if (c && !scheduledMeetings.length) c.innerHTML = '<p class="loading" style="padding:10px 0">Loading meetings…</p>';
  google.script.run.withSuccessHandler(function (list) {
    scheduledMeetings = list || [];
    renderMeetingsList(scheduledMeetings);
    var st = document.getElementById("sessionType");
    if (st && st.value === "meeting") applyMeetingAutofill();
  }).withFailureHandler(function () {
    if (c) c.innerHTML = '<p class="loading" style="padding:10px 0">Couldn\u2019t load meetings.</p>';
  }).getMeetings();
}

function renderMeetingsList(list) {
  var c = document.getElementById("meetingsList");
  if (!c) return;
  if (!list || !list.length) {
    c.innerHTML = '<p style="font-size:12.5px;color:var(--ink-500);padding:10px 0">No meetings scheduled yet.</p>';
    return;
  }
  var h = "";
  for (var i = 0; i < list.length; i++) {
    var m = list[i];
    var grpStr = (m.groups && m.groups.length) ? " · " + esc(m.groups.join(" / ")).toUpperCase() : "";
    h += '<div class="meeting-item">'
      +    '<div class="meeting-item-info">'
      +      '<div class="meeting-item-title">' + esc(m.title || "Meeting") + '</div>'
      +      '<div class="meeting-item-meta">' + esc(m.dayName ? m.dayName + " · " : "") + fmtDayMon(m.date) + " · " + fmtTime12(m.time) + grpStr + '</div>'
      +    '</div>'
      +    '<button class="meeting-del" onclick="deleteMeeting(\'' + jsStr(m.id) + '\')">Delete</button>'
      + '</div>';
  }
  c.innerHTML = h;
}

function scheduleMeeting() {
  var date  = document.getElementById("mtgDate").value;
  var time  = document.getElementById("mtgTime").value;
  var title = document.getElementById("mtgTitle").value.trim();
  var boxes = document.querySelectorAll(".mtgGroup");
  var groups = [];
  for (var i = 0; i < boxes.length; i++) if (boxes[i].checked) groups.push(boxes[i].value);
  if (!date)          { showToast("Pick a date.", "error"); return; }
  if (!time)          { showToast("Pick a time.", "error"); return; }
  if (!title)         { showToast("Enter a meeting title.", "error"); return; }
  if (!groups.length) { showToast("Select at least one group.", "error"); return; }
  var btn = document.getElementById("btnScheduleMtg");
  btn.disabled = true; btn.textContent = "Scheduling…";
  google.script.run.withSuccessHandler(function () {
    btn.disabled = false; btn.textContent = "Schedule meeting";
    showToast("Meeting scheduled.", "success");
    document.getElementById("mtgTitle").value = "";
    document.getElementById("mtgTime").value = "";
    for (var i = 0; i < boxes.length; i++) boxes[i].checked = false;
    loadMeetings();
  }).withFailureHandler(function (e) {
    btn.disabled = false; btn.textContent = "Schedule meeting";
    showToast("Failed: " + e.message, "error");
  }).scheduleMeeting({ date: date, time: time, title: title, groups: groups });
}

function deleteMeeting(id) {
  google.script.run.withSuccessHandler(function () {
    showToast("Meeting deleted.", "success");
    loadMeetings();
  }).withFailureHandler(function (e) {
    showToast("Failed: " + e.message, "error");
  }).deleteMeeting(id);
}

// "2026-06-18" → "18 Jun"
function fmtDayMon(ds) {
  if (!ds) return "";
  var p = String(ds).split("-");
  if (p.length < 3) return esc(String(ds));
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return parseInt(p[2], 10) + " " + (mn[p[1] - 1] || "");
}

// Escape a value for safe inlining inside a single-quoted onclick attribute.
function jsStr(s) {
  return String(s == null ? "" : s).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, "&quot;");
}

function onGroupChange() {
  selectedGroups = getSelectedGroups();
  if (selectedGroups.length === 0) { showToast("Select at least one group.", "error"); return; }
  var ds = document.getElementById("attendanceDate").value;
  if (!ds) { showToast("Select a date.", "error"); return; }
  document.getElementById("memberList").innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading…</div></div>';
  document.getElementById("submitArea").style.display = "none";
  document.getElementById("quickActions").style.display = "none";
  document.getElementById("searchArea").style.display = "none";
  document.getElementById("memberCount").textContent = "";
  document.getElementById("probationCard").innerHTML = "";
  sessionApologies = {};
  google.script.run
    .withSuccessHandler(onMembersLoaded)
    .withFailureHandler(function (e) { showToast("Failed: " + e.message, "error"); })
    .getMembers(selectedGroups);
  google.script.run
    .withSuccessHandler(function (apols) { sessionApologies = apols || {}; applyApologyDefaults(); })
    .withFailureHandler(function () {})
    .getApologiesForDate(ds, selectedGroups);
}

function applyApologyDefaults() {
  var changed = false;
  for (var i = 0; i < members.length; i++) {
    var name = members[i].name;
    var apol = sessionApologies[name];
    if (!apol) continue;
    var shouldApply = (apol.status === "Approved") || (apol.status === "Pending" && apol.onTime);
    if (shouldApply) {
      if      (apol.type === "Late")   attendance[name] = "Late Excused";
      else if (apol.type === "Absent") attendance[name] = "Absent Excused";
      changed = true;
    }
  }
  if (changed) { renderMembers(); updateSummary(); }
}

function onMembersLoaded(data) {
  members = data;
  attendance = {};
  for (var i = 0; i < members.length; i++) attendance[members[i].name] = "Present";
  renderMembers();
  document.getElementById("submitArea").style.display = "block";
  document.getElementById("quickActions").style.display = "flex";
  document.getElementById("searchArea").style.display = "block";
  document.getElementById("memberCount").textContent = members.length + " MEMBERS";
  updateSummary();
}

function setPrimary(name, type) {
  if      (type === "p") attendance[name] = "Present";
  else if (type === "l") attendance[name] = "Late Excused";
  else                   attendance[name] = "Absent Unexcused";
  renderMembers(); updateSummary();
}
function setSub(name, status) { attendance[name] = status; renderMembers(); updateSummary(); }
function setAll(status) {
  for (var i = 0; i < members.length; i++) attendance[members[i].name] = status;
  renderMembers(); updateSummary();
}

function handleSubmit() {
  var ds = document.getElementById("attendanceDate").value;
  if (!ds)                          { showToast("Select a date.",  "error"); return; }
  if (selectedGroups.length === 0)  { showToast("Select a group.", "error"); return; }
  setBusy(true);
  google.script.run.withSuccessHandler(function (r) {
    if (r.exists) {
      setBusy(false);
      document.getElementById("overwriteMsg").innerHTML =
        'Attendance for <b>' + r.groups.join(", ") + '</b> on ' + formatDateDisplay(ds) + ' already exists. Submitting now will replace the existing rows.';
      document.getElementById("overwriteDialog").style.display = "flex";
    } else {
      submitAttendance(false);
    }
  }).withFailureHandler(function (e) { setBusy(false); showToast("Error: " + e.message, "error"); })
    .checkExistingAttendance(ds, selectedGroups);
}
function confirmOverwrite() { closeDialog(); submitAttendance(true); }
function closeDialog()      { document.getElementById("overwriteDialog").style.display = "none"; }

function submitAttendance(ow) {
  setBusy(true);
  var ds = document.getElementById("attendanceDate").value;
  var recs = members.map(function (m) {
    return { name: m.name, groups: m.groups, roles: m.roles, status: attendance[m.name] };
  });
  google.script.run.withSuccessHandler(function (r) {
    setBusy(false);
    showPostSubmit(r);
    loadProbationCard();

function showPostSubmit(r) {
  // Tally string from r.summary
  var totals = {};
  for (var g in r.summary) {
    for (var k in r.summary[g]) totals[k] = (totals[k] || 0) + r.summary[g][k];
  }
  var grandTotal = 0, attended = 0;
  for (var s in totals) { grandTotal += totals[s]; if (s === "Present" || s === "Late Excused" || s === "Late Unexcused") attended += totals[s]; }
  var rate = grandTotal ? Math.round((attended / grandTotal) * 100) : 0;

  var body = '<div style="background:var(--ink);color:var(--paper);border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">'
    +   '<div><div style="font-family:var(--f-mono);font-size:9.5px;color:var(--gold-300);letter-spacing:.14em">TALLY</div><div style="display:flex;gap:12px;margin-top:6px;font-size:12px">';
  var order = ["Present","Late Excused","Late Unexcused","Absent Excused","Absent Unexcused"];
  for (var oi = 0; oi < order.length; oi++) {
    if (!totals[order[oi]]) continue;
    body += '<span><span class="num" style="font-size:18px;color:var(--paper)">' + totals[order[oi]] + '</span> <span style="color:var(--ink-300)">' + getStatusAbbrev(order[oi]) + '</span></span>';
  }
  body += '</div></div>'
    +   '<div style="text-align:right"><div style="font-family:var(--f-mono);font-size:9.5px;color:var(--gold-300);letter-spacing:.14em">RATE</div><div class="num" style="font-size:22px;color:var(--paper);margin-top:4px">' + rate + '%</div></div>'
    + '</div>';

  // Probation evals
  if (r.probationEvals && r.probationEvals.length > 0) {
    body += '<div class="eyebrow" style="margin:18px 0 10px">Probation evaluations · ' + r.probationEvals.length + ' completed</div>';
    for (var i = 0; i < r.probationEvals.length; i++) {
      var e = r.probationEvals[i];
      var passed = e.result === "Passed" || e.result === "passed_clean" || e.result === "passed_conditional";
      var palBg = passed ? 'var(--present-bg)' : 'var(--crimson-100)';
      var palC  = passed ? 'var(--present)' : 'var(--crimson-600)';
      var label = e.result === "passed_conditional" ? 'PASSED · CONDITIONAL' : (passed ? 'PASSED' : 'FAILED');
      body += '<div style="padding:12px 14px;border-radius:10px;margin-bottom:8px;background:' + palBg + ';display:flex;align-items:center;justify-content:space-between">'
        +    '<div><div style="font-size:13px;font-weight:600;color:var(--ink)">' + esc(e.name) + '</div>'
        +    '<div style="font-size:11.5px;color:var(--ink-600);margin-top:3px">' + e.attended + ' of 10 · ' + e.rate + '%' + (e.penalty ? ' · ' + e.penalty + ' pts' : '') + '</div></div>'
        +    '<span style="font-family:var(--f-mono);font-size:9.5px;font-weight:700;letter-spacing:.12em;color:' + palC + ';padding:4px 8px;border-radius:4px;background:#fff">' + label + '</span>'
        + '</div>';
    }
    body += '<div style="font-size:11.5px;color:var(--ink-500);margin-top:6px">Members and CC\u2019d admins have been notified by email.</div>';
  }

  document.getElementById("postSubmitEyebrow").textContent = (selectedGroups.join(" \u00b7 ") || "Attendance") + " \u00b7 recorded";
  document.getElementById("postSubmitBody").innerHTML = body;
  document.getElementById("postSubmitDialog").style.display = "flex";
}

  document.getElementById("postSubmitDialog").style.display = "none";
}

function saveChanges() {
  var u = [];
  for (var ri in viewEditedStatuses) {
    if (viewEditedStatuses[ri] !== viewOriginalStatuses[ri]) {
      u.push({ rowIndex: parseInt(ri), newStatus: viewEditedStatuses[ri] });

  }
  if (u.length === 0) return;
  var btn = document.getElementById("btnSaveChanges");
  if (btn) { btn.disabled = true; btn.textContent = "Saving…"; }
  google.script.run.withSuccessHandler(function (r) {
    showToast(r.changed + " record" + (r.changed > 1 ? "s" : "") + " updated.", "success");
    for (var ri2 in viewEditedStatuses) {
      viewOriginalStatuses[ri2] = viewEditedStatuses[ri2];
      for (var i = 0; i < viewRecords.length; i++) {
        if (viewRecords[i].rowIndex === parseInt(ri2)) { viewRecords[i].status = viewEditedStatuses[ri2]; break; }
      }

    viewEditedStatuses = {}; hideChangesBar(); if (sessDetailActive) paintSessionDetail(); else renderViewTab();
  }).withFailureHandler(function (e) {
    showToast("Failed: " + e.message, "error");

}

// -- Upcoming sessions dropdown (single, unified session picker) ----------
var apolSessions = [];
var apolCustomDate = false;

function loadUpcomingSessions() {
  var sel = document.getElementById("apolSessionSelect");
  if (!sel) return;

    .withFailureHandler(function () {

function renderApolSessionOptions(list) {
  apolSessions = (list || []).slice();
  var sel = document.getElementById("apolSessionSelect");
  if (!sel) return;
  if (!apolSessions.length) {
    sel.innerHTML = '<option value="">No upcoming sessions \u2014 pick a date below</option>';
    apolNextInfo = null;
    updateApolConfirm();
    return;
  }
  var h = "", defaultIdx = -1;
  for (var i = 0; i < apolSessions.length; i++) {
    var s = apolSessions[i];
    var isMeeting = String(s.kind || "").toLowerCase() === "meeting";
    var lbl = (s.dayName || "") + " \u00b7 " + fmtDayMon(s.date)
            + " \u00b7 " + (s.title ? s.title : (isMeeting ? "Meeting" : "Practice"))
            + " \u00b7 " + fmtTime12(s.time);
    if (s.deadlinePassed) lbl += " \u2014 closed";
    if (defaultIdx === -1 && !s.deadlinePassed) defaultIdx = i;
    h += '<option value="' + i + '">' + esc(lbl) + '</option>';
  }
  if (defaultIdx === -1) defaultIdx = 0;
  sel.innerHTML = h;
  sel.value = String(defaultIdx);
  apolCustomDate = false;
  applyApolSession(apolSessions[defaultIdx]);
}

function onApolSessionSelect() {
  var sel = document.getElementById("apolSessionSelect");
  if (!sel) return;
  var idx = parseInt(sel.value, 10);
  if (isNaN(idx) || !apolSessions[idx]) return;
  apolCustomDate = false;
  var custom = document.getElementById("apolCustomOpt");
  if (custom && custom.parentNode) custom.parentNode.removeChild(custom);
  var sub = document.getElementById("apolOtherDateSub");
  if (sub) sub.textContent = "NOT LISTED ABOVE? PICK A DATE";
  applyApolSession(apolSessions[idx]);
}

// Fill the session detail (meta + deadline + cut-off + confirmation) from a session.
function applyApolSession(s) {
  apolNextInfo = s || null;
  if (!s) { updateApolConfirm(); return; }
  var p = String(s.date).split("-");
  var dn3 = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var dObj = (p.length === 3) ? new Date(p[0], p[1] - 1, p[2]) : null;

  var d = document.getElementById("apolDate");
  if (d) d.value = s.date;

  var isMeeting = String(s.kind || "").toLowerCase() === "meeting";
  var grp = (s.groups && s.groups.length) ? s.groups.join(" / ").toUpperCase() : "";
  var meta = document.getElementById("apolSessionMeta");
  if (meta) meta.textContent = (s.title ? s.title.toUpperCase() + " \u00b7 " : "")
    + (isMeeting ? "MEETING" : "PRACTICE") + " \u00b7 " + fmtTime12(s.time) + (grp ? " \u00b7 " + grp : "");

  var dl = document.getElementById("apolSessionDeadline");
  if (dl) {
    dl.textContent = s.deadlinePassed ? "APOLOGY DEADLINE PASSED"
      : "APOLOGISE BY " + fmtTime12(s.deadline, true) + " \u00b7 " + fmtDayMonUpper(s.date);
    dl.className = "apol-session-deadline" + (s.deadlinePassed ? " passed" : "");
  }

  var cutoff = document.getElementById("apolCutoff");
  if (cutoff && dObj) cutoff.textContent = "CUT-OFF \u00b7 " + dn3[dObj.getDay()] + " " + fmtDayMonUpper(s.date) + " \u00b7 " + fmtTime12(s.deadline);

  updateApolConfirm();
}

// Confirmation notice — reflects the chosen session's deadline state + apology type.
function updateApolConfirm() {
  var conf  = document.getElementById("apolConfirm");
  var mark  = document.getElementById("apolConfirmMark");
  var title = document.getElementById("apolConfirmTitle");
  var body  = document.getElementById("apolConfirmBody");
  var type  = (document.getElementById("apolType") || {}).value || "Absent";
  var info  = apolNextInfo;
  if (apolCustomDate || !info || !info.date) {
    if (conf)  conf.className = "apol-confirm";
    if (mark)  mark.textContent = "\u2713";
    if (title) title.textContent = "Timing is checked when you submit.";
    if (body)  body.innerHTML = "Before the 4\u00a0PM cut-off on the day it auto-accepts as <strong>" + esc(type) + "&nbsp;\u00b7&nbsp;Excused</strong>. After that it counts as Unexcused.";
    return;
  }
  if (info.deadlinePassed) {
    if (conf)  conf.className = "apol-confirm passed";
    if (mark)  mark.textContent = "!";
    if (title) title.textContent = "This session is past the cut-off.";
    if (body)  body.innerHTML = "Submitted now, it will be counted as <strong>Unexcused</strong> \u2014 points are still deducted.";
  } else {
    if (conf)  conf.className = "apol-confirm";
    if (mark)  mark.textContent = "\u2713";

function submitMemberApology() {
  var dateStr = document.getElementById("apolDate").value;
  var type    = document.getElementById("apolType").value;

  if (!dateStr) { showToast("Select a date.", "error"); return; }
  if (!reason)  { showToast("Enter a reason.", "error"); return; }
  var btn = document.getElementById("btnSubmitApology");
  btn.disabled = true; btn.textContent = "Submitting…";
  var lookupGroups = myGroups.length > 0 ? myGroups : ["Choir","Band","Orchestra"];
  // If a specific upcoming session is selected, carry its label + groups so the
  // backend matches the apology to that exact session (per-session matching).
  var selLabel = "", selGroups = [];
  if (apolNextInfo && apolNextInfo.date === dateStr) {
    selLabel = (String(apolNextInfo.kind||"").toLowerCase()==="meeting") ? (apolNextInfo.title || "Meeting") : "Practice";
    selGroups = apolNextInfo.groups || [];
  }
  google.script.run.withSuccessHandler(function (info) {
    var sessionTime = info.found ? (info.latest || info.time) : "";
    // Prefer the selected session's exact time when available
    if (apolNextInfo && apolNextInfo.date === dateStr && apolNextInfo.time) sessionTime = apolNextInfo.time;
    google.script.run.withSuccessHandler(function (r) {
      btn.disabled = false; btn.textContent = "Submit apology";
      showToast(r.onTime ? "Apology submitted on time." : "Apology submitted but past the deadline.", r.onTime ? "success" : "error");
      document.getElementById("apolReason").value = "";
      loadMyApologies();
    }).withFailureHandler(function (e) {
      btn.disabled = false; btn.textContent = "Submit apology";
      showToast("Failed: " + e.message, "error");
    }).submitApology(dateStr, type, reason, sessionTime, selLabel, selGroups);
  }).withFailureHandler(function () {
    google.script.run.withSuccessHandler(function () {
      btn.disabled = false; btn.textContent = "Submit apology";
      showToast("Apology submitted (no schedule found for timing check).", "success");
      document.getElementById("apolReason").value = ""; loadMyApologies();
    }).withFailureHandler(function (e) {
      btn.disabled = false; btn.textContent = "Submit apology";
      showToast("Failed: " + e.message, "error");
    }).submitApology(dateStr, type, reason, "", selLabel, selGroups);
  }).getSessionTime(dateStr, lookupGroups);
}

// emailDeniedAdmin reads two globals set during auth (see §3 getUserRole):

function emailDeniedAdmin(){
  var admin=window.adminContactEmail||"";
  var userEmail=window.deniedUserEmail||"";
  var subject=encodeURIComponent("Request to join Strathmore Chorale Attendance System");
  var body=encodeURIComponent("Hello,\n\nI would like to be added to the Chorale Attendance System. My email is: "+userEmail+"\n\nThank you.");
  if(admin){window.location.href="mailto:"+admin+"?subject="+subject+"&body="+body;}
  else{showToast("No admin contact configured.","error");}
}

function signInDifferentAccount(){
  // Apps Script runs sandboxed in an iframe, so we can't redirect the iframe to
  // Google's account chooser (it refuses to load in a frame). Open a new tab to
  // Google's logout, which then lets the user pick a different account; they
  // reopen the app URL from there. window.open escapes the iframe sandbox.
  var appUrl = (window.APP_URL_FOR_SWITCH || "");
  var logoutUrl = "https://accounts.google.com/Logout";
  var win = window.open(logoutUrl, "_blank");
  if(!win){
    showToast("Please allow pop-ups, then tap again to switch accounts.","error");
    return;
  }
  showToast("Signed out in a new tab. Sign in with the other account, then reopen the app.","success");
}

// Sign out from within the app (members + admins). Same iframe constraint:
// we open Google logout in a new tab; the app session ends when they re-auth.
function signOut(){
  if(!confirm("Sign out? This opens Google sign-out in a new tab. You'll need to sign back in to use the app."))return;
  var win=window.open("https://accounts.google.com/Logout","_blank");
  if(!win){showToast("Please allow pop-ups to sign out.","error");return;}
  showToast("Signed out in a new tab.","success");
}

// Send practice reminder — called from Record tab. Opens a dialog so the admin
// can add a note and choose which signature the email is sent with.
var reminderPending = null;

function sendReminder(){
  var ds=document.getElementById("attendanceDate").value;
  var groups=getSelectedGroups();
  var time=document.getElementById("sessionTime").value;
  if(!ds){showToast("Select a date first.","error");return;}
  if(groups.length===0){showToast("Select at least one group.","error");return;}
  reminderPending={ds:ds,groups:groups,time:time};

  document.getElementById("reminderContext").textContent=groups.join(" · ")+" — "+formatDateDisplay(ds)+(time?" at "+time:"");
  document.getElementById("reminderNote").value="";

  // Populate the signature picker from the server (falls back to a default).
  var sel=document.getElementById("reminderSignature");
  sel.innerHTML='<option value="general">Loading signatures…</option>';
  sel.disabled=true;
  google.script.run.withSuccessHandler(function(opts){
    sel.innerHTML="";
    (opts&&opts.length?opts:[{key:"general",label:"Chorale Committee (default)"}]).forEach(function(o){
      var op=document.createElement("option");
      op.value=o.key; op.textContent=o.label;
      sel.appendChild(op);
    });
    sel.disabled=false;
  }).withFailureHandler(function(){
    sel.innerHTML='<option value="general">Chorale Committee (default)</option>';
    sel.disabled=false;
  }).getSignatureOptions();

  document.getElementById("reminderDialog").style.display="flex";
}

function closeReminderDialog(){
  document.getElementById("reminderDialog").style.display="none";
  reminderPending=null;
}

function confirmSendReminder(){
  if(!reminderPending){closeReminderDialog();return;}
  var note=document.getElementById("reminderNote").value||"";
  var sig=document.getElementById("reminderSignature").value||"general";
  var p=reminderPending;
  var btn=document.getElementById("btnSendReminder");
  btn.disabled=true; btn.textContent="Sending…";
  google.script.run.withSuccessHandler(function(r){
    btn.disabled=false; btn.textContent="Send reminder";
    closeReminderDialog();
    if(r.success)showToast("Reminder sent to "+r.count+" member(s).","success");
    else showToast(r.message||"No reminders sent.","error");
  }).withFailureHandler(function(e){
    btn.disabled=false; btn.textContent="Send reminder";
    showToast("Failed: "+e.message,"error");
  }).sendPracticeReminder(p.ds,p.groups,p.time,note,sig);
}
