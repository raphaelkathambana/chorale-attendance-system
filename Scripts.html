
<script>
// ═══════════════════════════════════════════════════════════════════════════
//  STRATHMORE CHORALE · ATTENDANCE · CLIENT SCRIPTS
//  ─────────────────────────────────────────────────────────────────────────
//  Layout:
//    1. RENDER LAYER   — every function that builds HTML lives up here, so
//                        we can find the bit that draws X in one place.
//    2. HELPERS        — esc / showToast / date formatting / status helpers.
//    3. AUTH & TAB NAV — first run, role detection, mobile/desktop nav.
//    4. RECORD TAB
//    5. VIEW & EDIT TAB
//    6. MEMBERS TAB
//    7. MY ATTENDANCE TAB (member + admin)
//    8. MEMBER SCOREBOARD
//    9. APOLOGY REVIEW (admin)
//   10. EXPORT HANDLERS
//
//  Backend contract is UNCHANGED — every google.script.run.* call here
//  matches Code.gs by name, args, and return shape.
// ═══════════════════════════════════════════════════════════════════════════


// ═══════════════════════════════════════════════════════════════════════════
//  1.  RENDER LAYER
//  Every function that produces a string of HTML or mutates .innerHTML.
//  Sorted by tab. Logic later in the file calls these.
// ═══════════════════════════════════════════════════════════════════════════

// ─── 1.1  RECORD TAB ──────────────────────────────────────────────────────

function renderMembers() {
  var c = document.getElementById("memberList");
  var s = (document.getElementById("searchInput").value || "").toLowerCase();
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;

  if (isDesktop) {
    // Desktop: 4-column grid layout (one card per role-group) + right rail
    var colsHtml = '<div class="record-desktop-grid"><div class="record-main-grid">';
    if (selectedGroups.length > 1) {
      for (var ei = 0; ei < selectedGroups.length; ei++) {
        var ens = selectedGroups[ei], em = [];
        for (var i = 0; i < members.length; i++) {
          var m = members[i];
          if (s && m.name.toLowerCase().indexOf(s) === -1) continue;
          if (m.groups.indexOf(ens) === -1) continue;
          em.push({ name: m.name, role: (m.roles && m.roles[ens]) || "Other", probation: m.probation });
        }
        if (em.length === 0) continue;
        colsHtml += renderSectionColumns(groupByRole(em), ens);
      }
    } else {
      var grp = selectedGroups[0], f = [];
      for (var j = 0; j < members.length; j++) {
        var m2 = members[j];
        if (s && m2.name.toLowerCase().indexOf(s) === -1) continue;
        f.push({ name: m2.name, role: (m2.roles && m2.roles[grp]) || "Other", probation: m2.probation });
      }
      colsHtml += renderSectionColumns(groupByRole(f), grp);
    }
    colsHtml += '</div>';
    // Right rail: tally + apologies + probation
    colsHtml += '<aside class="record-rail">' + renderRecordRail() + '</aside>';
    colsHtml += '</div>';
    c.innerHTML = colsHtml || '<p class="loading">No members found.</p>';
  } else {
    // Mobile: flat list
    var html = "";
    if (selectedGroups.length > 1) {
      for (var ei2 = 0; ei2 < selectedGroups.length; ei2++) {
        var ens2 = selectedGroups[ei2], em2 = [];
        for (var i2 = 0; i2 < members.length; i2++) {
          var m3 = members[i2];
          if (s && m3.name.toLowerCase().indexOf(s) === -1) continue;
          if (m3.groups.indexOf(ens2) === -1) continue;
          em2.push({ name: m3.name, role: (m3.roles && m3.roles[ens2]) || "Other", probation: m3.probation });
        }
        if (em2.length === 0) continue;
        html += '<div class="ensemble-header"><span>' + esc(ens2) + '</span><span>' + em2.length + '</span></div>';
        html += renderRoleGroupsRecord(groupByRole(em2));
      }
    } else {
      var grp2 = selectedGroups[0], f2 = [];
      for (var j2 = 0; j2 < members.length; j2++) {
        var m4 = members[j2];
        if (s && m4.name.toLowerCase().indexOf(s) === -1) continue;
        f2.push({ name: m4.name, role: (m4.roles && m4.roles[grp2]) || "Other", probation: m4.probation });
      }
      html += renderRoleGroupsRecord(groupByRole(f2));
    }
    c.innerHTML = html || '<p class="loading">No members found.</p>';
  }
}

function renderSectionColumns(rgs, ensembleName) {
  var h = '';
  for (var i = 0; i < rgs.length; i++) {
    var rg = rgs[i];
    h += '<div class="record-section-col">';
    h += '<div class="col-header"><span class="eyebrow">' + esc(rg.role) + '</span><span style="font-family:var(--f-mono);font-size:10px;color:var(--ink-400)">' + rg.members.length + '</span></div>';
    h += '<div class="col-body">';
    for (var j = 0; j < rg.members.length; j++) {
      var m = rg.members[j];
      var st = attendance[m.name] || "Present";
      var primary = st === "Present" ? "p" : st.indexOf("Late") !== -1 ? "l" : "a";
      var probTag = m.probation ? ' <span class="prob-tag" style="background:var(--crimson-100);color:var(--crimson-600)">PROB</span>' : '';
      var apol = sessionApologies[m.name];
      var apolTag = apol ? (apol.onTime ? ' <span class="prob-tag" style="background:var(--present-bg);color:var(--present)">APOL \u2713</span>' : ' <span class="prob-tag" style="background:var(--crimson-100);color:var(--crimson-600)">APOL \u00b7 LATE</span>') : '';
      var sn = esc(m.name).replace(/'/g, "\\'").replace(/"/g, "&quot;");
      var excused = st === "Late Excused" || st === "Absent Excused";
      h += '<div class="col-member">';
      h += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:12.5px;font-weight:600;color:var(--ink)">' + esc(m.name) + '</span>' + probTag + apolTag + '</div>';
      h += '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">';
      h += '<div class="status-primary">';
      h += '<button class="' + (primary === "p" ? "active-p" : "") + '" onclick="setPrimary(\'' + sn + '\',' + "'p')" + '">P</button>';
      h += '<button class="' + (primary === "l" ? "active-l" : "") + '" onclick="setPrimary(\'' + sn + '\',' + "'l')" + '">L</button>';
      h += '<button class="' + (primary === "a" ? "active-a" : "") + '" onclick="setPrimary(\'' + sn + '\',' + "'a')" + '">A</button>';
      h += '</div>';
      if (primary === "l") {
        h += '<div class="status-sub">';
        h += '<button class="' + (excused ? "active-exc" : "") + '" onclick="setSub(\'' + sn + '\',\'Late Excused\')">Exc</button>';
        h += '<button class="' + (!excused ? "active-lunexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Late Unexcused\')">Unexc</button>';
        h += '</div>';
      }
      if (primary === "a") {
        h += '<div class="status-sub">';
        h += '<button class="' + (excused ? "active-aexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Absent Excused\')">Exc</button>';
        h += '<button class="' + (!excused ? "active-unexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Absent Unexcused\')">Unexc</button>';
        h += '</div>';
      }
      h += '</div>';
      h += '</div>';
    }
    h += '</div></div>';
  }
  return h;
}

function renderRecordRail() {
  var h = '<div class="eyebrow" style="margin-bottom:8px">TALLY</div>';
  h += '<span class="gold-rule" style="margin:0 0 12px"></span>';
  h += '<div id="railSummary">' + renderRailTally() + '</div>';
  // Apologies for this session
  h += '<div class="eyebrow" style="margin:18px 0 8px">APOLOGIES FOR TODAY</div>';
  h += '<span class="gold-rule" style="margin:0 0 12px"></span>';
  var apolNames = Object.keys(sessionApologies);
  if (apolNames.length === 0) {
    h += '<p style="font-size:12px;color:var(--ink-500)">No apologies for this session.</p>';
  } else {
    for (var i = 0; i < apolNames.length; i++) {
      var a = sessionApologies[apolNames[i]];
      var stLabel = a.onTime ? '<span style="font-family:var(--f-mono);font-size:9px;color:var(--present);letter-spacing:.1em;font-weight:700">ACCEPTED</span>'
                             : '<span style="font-family:var(--f-mono);font-size:9px;color:var(--gold-700);letter-spacing:.1em;font-weight:700">REVIEW</span>';
      h += '<div style="padding:10px 12px;background:var(--paper);border-radius:10px;border:1px solid var(--paper-200);margin-bottom:8px">'
        +    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
        +      '<span style="font-size:12.5px;font-weight:600;color:var(--ink)">' + esc(apolNames[i]) + '</span>'
        +      stLabel
        +    '</div>'
        +    '<div style="font-size:11px;color:var(--ink-500)">' + esc(a.type || '') + (a.reason ? ' \u00b7 "' + esc(a.reason) + '"' : '') + '</div>'
        + '</div>';
    }
  }
  return h;
}

function renderRailTally() {
  var t = {};
  for (var i = 0; i < members.length; i++) {
    var st = attendance[members[i].name];
    t[st] = (t[st] || 0) + 1;
  }
  var order = ["Present", "Late Excused", "Late Unexcused", "Absent Excused", "Absent Unexcused"];
  var h = '';
  for (var j = 0; j < order.length; j++) {
    var k = order[j];
    if (!t[k]) continue;
    h += '<div style="display:flex;align-items:center;gap:8px;padding:4px 9px;border-radius:6px;background:var(--paper);border:1px solid var(--paper-200);margin-bottom:6px">'
      +    '<span style="width:6px;height:6px;border-radius:999px;background:' + statusColor(k) + '"></span>'
      +    '<span style="font-family:var(--f-mono);font-size:11px;color:var(--ink-500);letter-spacing:.06em;font-weight:600">' + getStatusAbbrev(k) + '</span>'
      +    '<span style="font-family:var(--f-mono);font-size:13px;color:var(--ink);font-weight:600">' + t[k] + '</span>'
      + '</div>';
  }
  return h;
}

function renderRoleGroupsRecord(rgs) {
  var html = "";
  for (var i = 0; i < rgs.length; i++) {
    var rg = rgs[i];
    html += '<div class="role-group"><div class="role-group-header"><span>' + esc(rg.role) + '</span><span class="role-group-count">' + rg.members.length + '</span></div>';
    for (var j = 0; j < rg.members.length; j++) {
      var m = rg.members[j];
      var st = attendance[m.name] || "Present";
      var primary = st === "Present" ? "p" : st.indexOf("Late") !== -1 ? "l" : "a";
      var excused = st === "Late Excused" || st === "Absent Excused";
      var probTag = m.probation ? ' <span class="prob-tag" style="background:var(--crimson-100);color:var(--crimson-600)">PROB</span>' : '';
      var apol = sessionApologies[m.name];
      var apolTag = apol
        ? (apol.onTime
            ? ' <span class="prob-tag" style="background:var(--present-bg);color:var(--present)">APOL ✓</span>'
            : ' <span class="prob-tag" style="background:var(--crimson-100);color:var(--crimson-600)">APOL · LATE</span>')
        : '';
      var sn = esc(m.name).replace(/'/g, "\\'").replace(/"/g, "&quot;");
      html += '<div class="member-row"><span class="member-name">' + esc(m.name) + probTag + apolTag + '</span>';
      html += '<div class="status-primary">';
      html += '<button class="' + (primary === "p" ? "active-p" : "") + '" onclick="setPrimary(\'' + sn + "','p')\">P</button>";
      html += '<button class="' + (primary === "l" ? "active-l" : "") + '" onclick="setPrimary(\'' + sn + "','l')\">L</button>";
      html += '<button class="' + (primary === "a" ? "active-a" : "") + '" onclick="setPrimary(\'' + sn + "','a')\">A</button>";
      html += '</div>';
      if (primary === "l") {
        html += '<div class="status-sub">';
        html += '<button class="' + (excused ? "active-exc" : "") + '" onclick="setSub(\'' + sn + '\',\'Late Excused\')">Exc</button>';
        html += '<button class="' + (!excused ? "active-lunexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Late Unexcused\')">Unexc</button>';
        html += '</div>';
      }
      if (primary === "a") {
        html += '<div class="status-sub">';
        html += '<button class="' + (excused ? "active-aexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Absent Excused\')">Exc</button>';
        html += '<button class="' + (!excused ? "active-unexc" : "") + '" onclick="setSub(\'' + sn + '\',\'Absent Unexcused\')">Unexc</button>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

function updateSummary() {
  var t = {};
  for (var i = 0; i < members.length; i++) {
    var s = attendance[members[i].name];
    t[s] = (t[s] || 0) + 1;
  }
  var order = ["Present", "Late Excused", "Late Unexcused", "Absent Excused", "Absent Unexcused"];
  var html = '';
  for (var j = 0; j < order.length; j++) {
    var k = order[j];
    if (!t[k]) continue;
    html += '<span class="pill"><span class="dot" style="background:' + statusColor(k) + '"></span>'
         + '<span style="color:' + statusColor(k) + '">' + getStatusAbbrev(k) + '</span>'
         + '<span>' + t[k] + '</span></span>';
  }
  document.getElementById("summaryBar").innerHTML = html;
  // Also update the desktop rail tally if present
  var rail = document.getElementById("railSummary");
  if (rail) rail.innerHTML = renderRailTally();
}

function renderProbationEvalsCard(evals) {
  // Card shown after a save that completes probation for one or more members.
  var html = '<div class="prob-card danger"><div class="prob-card-title">Probation evaluations · ' + evals.length + ' completed</div>';
  for (var i = 0; i < evals.length; i++) {
    var e = evals[i];
    var cls = e.result === "Passed" ? "on-track" : "behind";
    html += '<div class="prob-member"><div class="prob-member-info">'
         +    '<span class="prob-member-name">' + esc(e.name) + '</span>'
         +    '<span class="prob-member-detail">' + e.attended + '/10 attended · ' + e.rate + '%</span>'
         +  '</div>'
         +  '<span class="prob-status ' + cls + '">' + e.result + '</span>'
         + '</div>';
  }
  html += '</div>';
  return html;
}

function renderProbationCard(rpt) {
  // Card shown above the submit area on Record tab: who's on probation in this group
  if (!rpt || rpt.length === 0) return '';
  var h = '<div class="prob-card"><div class="prob-card-title">Probation progress</div>';
  for (var i = 0; i < rpt.length; i++) {
    var r = rpt[i], cls = r.onTrack ? "on-track" : "behind";
    h += '<div class="prob-member"><div class="prob-member-info">'
      +   '<span class="prob-member-name">' + esc(r.name) + '</span>'
      +   '<span class="prob-member-detail">Since ' + r.probationStart + ' · ' + r.attended + '/' + r.maxSessions + ' attended · ' + r.remaining + ' left</span>'
      + '</div>'
      + '<span class="prob-status ' + cls + '">' + (r.onTrack ? "On Track" : "Behind") + '</span></div>';
  }
  h += '</div>';
  return h;
}

// ─── 1.2  VIEW & EDIT TAB ─────────────────────────────────────────────────

function renderViewTab() {
  var root = document.getElementById("viewRoot");
  var h = '<div class="section-head">'
        +   '<div class="eyebrow">History · admin</div>'
        +   '<span class="gold-rule"></span>'
        +   '<h2>View & edit.</h2>'
        +   '<p class="subtitle">Browse past sessions, correct mistakes, export reports, see the standings.</p>'
        + '</div>';
  h += '<div class="view-mode-toggle">'
     +   '<button class="' + (viewMode === "byDate"     ? "active" : "") + '" onclick="setViewMode(\'byDate\')">By date</button>'
     +   '<button class="' + (viewMode === "byMember"   ? "active" : "") + '" onclick="setViewMode(\'byMember\')">By member</button>'
     +   '<button class="' + (viewMode === "probation"  ? "active" : "") + '" onclick="setViewMode(\'probation\')">Probation</button>'
     +   '<button class="' + (viewMode === "scoreboard" ? "active" : "") + '" onclick="setViewMode(\'scoreboard\')">Scoreboard</button>'
     +   '<button class="' + (viewMode === "apologies"  ? "active" : "") + '" onclick="setViewMode(\'apologies\')">Requests</button>'
     + '</div>';
  if      (viewMode === "byDate")     h += renderByDateView();
  else if (viewMode === "byMember")   h += renderByMemberView();
  else if (viewMode === "probation")  h += renderProbationView();
  else if (viewMode === "scoreboard") h += renderScoreboardView();
  else if (viewMode === "apologies")  h += renderApologiesView();
  root.innerHTML = h;
}

function renderByDateView() {
  // Two-pane on desktop: date list left, detail right (or empty state).
  // On mobile (<1024px) the CSS collapses to a single column and we hide
  // whichever pane isn't currently focused.
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;

  var listHtml = '';
  listHtml += '<div class="controls"><select id="viewGroupSelect" onchange="onViewGroupChange()">';
  listHtml += '<option value="All"' + (viewGroup === "All" ? " selected" : "") + '>All groups</option>';
  for (var i = 0; i < GROUPS_LIST.length; i++) {
    listHtml += '<option value="' + GROUPS_LIST[i] + '"' + (viewGroup === GROUPS_LIST[i] ? " selected" : "") + '>' + GROUPS_LIST[i] + '</option>';
  }
  listHtml += '</select></div>';
  // Export panel
  listHtml += '<div class="export-section"><div class="export-section-title">Export range</div>'
            + '<div class="export-row">'
            +   '<input type="date" id="exportStart">'
            +   '<input type="date" id="exportEnd" value="' + todayStr() + '">'
            + '</div>'
            + '<div class="export-row"><button class="btn-export" onclick="exportDateRange(\'csv\')">CSV</button>'
            +   '<button class="btn-export" onclick="exportDateRange(\'pdf\')">PDF</button></div>'
            + '</div>';
  // Date list
  listHtml += '<div class="eyebrow" style="margin-bottom:8px">Sessions</div><div id="viewDateList">';
  if (viewDateList.length === 0) {
    listHtml += '<div class="loading"><div class="spinner"></div><div>Loading…</div></div>';
  } else {
    for (var d = 0; d < viewDateList.length; d++) {
      var it = viewDateList[d];
      var sel = (viewCurrentDate === it.date) ? ' style="border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)"' : '';
      listHtml += '<div class="date-item" onclick="loadDateDetail(\'' + it.date + '\')"' + sel + '>'
               +   '<div class="date-item-info">'
               +     '<span class="date-item-date">' + formatDateDisplay(it.date) + '</span>'
               +     '<span class="date-item-groups">' + it.groups.join(" · ") + '</span>'
               +   '</div>'
               +   '<span class="date-item-arrow">›</span>'
               + '</div>';
    }
  }
  listHtml += '</div>';

  var detailHtml = '';
  if (viewCurrentDate) {
    detailHtml = renderDateDetail();
  } else {
    detailHtml = '<div class="empty-pane">Pick a session on the left to view or edit it.</div>';
  }

  if (isDesktop) {
    return '<div class="two-pane" style="grid-template-columns:300px 1fr">'
         +   '<div class="two-pane-list">'  + listHtml   + '</div>'
         +   '<div class="two-pane-detail" style="position:static">' + detailHtml + '</div>'
         + '</div>';
  }
  // Mobile: only show one at a time
  if (viewCurrentDate) return detailHtml;
  return listHtml;
}

function renderDateDetail() {
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  var h = isDesktop ? '' : '<button class="back-btn" onclick="backToDateList()">← Back to sessions</button>';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px;flex-wrap:wrap">'
     +   '<div><div class="eyebrow">' + viewGroup.toUpperCase() + '</div>'
     +   '<h2 style="margin-top:4px">' + formatDateDisplay(viewCurrentDate) + '</h2></div>'
     +   '<div style="display:flex;gap:6px">'
     +     '<button class="btn-export" onclick="exportSingleDate(\'csv\')">CSV</button>'
     +     '<button class="btn-export" onclick="exportSingleDate(\'pdf\')">PDF</button>'
     +     '<button class="btn-export" onclick="emailSessionSummary(viewCurrentDate, viewGroup)">Email admins</button>'
     +   '</div>'
     + '</div>';
  if (viewRecords.length === 0) return h + '<div class="loading"><div class="spinner"></div><div>Loading…</div></div>';

  // Group records by session key (e.g. "Choir", "Band,Choir")
  var sessionMap = {};
  for (var i = 0; i < viewRecords.length; i++) {
    var r = viewRecords[i], sess = r.session || r.group;
    if (!sessionMap[sess]) sessionMap[sess] = [];
    sessionMap[sess].push(r);
  }
  var sessionKeys = Object.keys(sessionMap).sort();
  var multiSession = sessionKeys.length > 1;

  h += '<div class="search-bar"><input type="text" id="viewSearchInput" placeholder="Search…" value="' + esc(viewSearchVal) + '" oninput="viewSearchVal=this.value;renderViewTab()"></div>';
  var sv = viewSearchVal.toLowerCase();

  for (var si = 0; si < sessionKeys.length; si++) {
    var sessKey = sessionKeys[si];
    var sessRecs = sessionMap[sessKey];
    var sessLabel = sessKey.indexOf(",") !== -1 ? "Joint · " + sessKey.replace(/,/g, " + ") : sessKey;

    if (multiSession) {
      h += '<div style="margin:14px 0 8px;padding:8px 12px;background:var(--paper-100);border-left:3px solid var(--gold);border-radius:8px;font-family:var(--f-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-700)">Session · ' + esc(sessLabel) + '</div>';
    }

    // Per-group summary — dark tally strip on desktop, simple card on mobile
    var gs = {};
    for (var j = 0; j < sessRecs.length; j++) {
      var sr = sessRecs[j], st = viewEditedStatuses[sr.rowIndex] || sr.status;
      if (!gs[sr.group]) gs[sr.group] = {};
      gs[sr.group][st] = (gs[sr.group][st] || 0) + 1;
    }
    if (isDesktop) {
      h += '<div class="tally-strip">';
      for (var g in gs) {
        var totalG = 0; for (var k in gs[g]) totalG += gs[g][k];
        var pctG = totalG > 0 ? Math.round(((gs[g]["Present"] || 0) + (gs[g]["Late Excused"] || 0)) / totalG * 100) : 0;
        h += '<div class="tally-block"><span class="tally-label">' + esc(g).toUpperCase() + ' \u00b7 TALLY</span>'
           + '<div class="tally-row">';
        var sOrder = ["Present","Late Excused","Late Unexcused","Absent Excused","Absent Unexcused"];
        for (var si = 0; si < sOrder.length; si++) {
          if (gs[g][sOrder[si]]) {
            h += '<span><span class="num" style="color:' + statusColor(sOrder[si]).replace("var(--","").replace(")","") + '">' + gs[g][sOrder[si]] + '</span> <span style="color:var(--ink-300)">' + getStatusAbbrev(sOrder[si]) + '</span></span>';
          }
        }
        h += '</div></div>';
        h += '<div class="tally-divider"></div>';
        h += '<div class="tally-block"><span class="tally-label">RATE</span><span class="num" style="font-size:22px;color:var(--paper)">' + pctG + '%</span></div>';
        h += '<div class="tally-divider"></div>';
      }
      // Trim last divider by wrapping
      h += '</div>';
    } else {
      for (var g2 in gs) {
        h += '<div class="summary-card"><div class="summary-card-title">' + esc(g2) + ' \u00b7 tally</div><div class="summary-card-row">';
        for (var st2 in gs[g2]) h += '<span style="color:' + statusColor(st2) + '">' + getStatusAbbrev(st2) + ' \u00b7 ' + gs[g2][st2] + '</span>';
        h += '</div></div>';
      }
    }

    // Members grouped by ensemble then role — 2-col grid on desktop
    if (isDesktop) h += '<div class="view-detail-grid">';
    var ens = Object.keys(gs).sort();
    for (var ei = 0; ei < ens.length; ei++) {
      var en = ens[ei];
      if (ens.length > 1 || multiSession) {
        h += '<div class="ensemble-header"><span>' + esc(en) + '</span></div>';
      }
      var er = sessRecs.filter(function (r) { return r.group === en; });
      if (sv) er = er.filter(function (r) { return r.name.toLowerCase().indexOf(sv) !== -1; });
      var rm = {};
      for (var ri = 0; ri < er.length; ri++) {
        var rl = er[ri].role || "Other";
        if (!rm[rl]) rm[rl] = [];
        rm[rl].push(er[ri]);
      }
      var rk = Object.keys(rm).sort(function (a, b) {
        return a === "Other" ? 1 : b === "Other" ? -1 : a.localeCompare(b);
      });
      for (var ki = 0; ki < rk.length; ki++) {
        var recs = rm[rk[ki]];
        h += '<div class="role-group"><div class="role-group-header"><span>' + esc(rk[ki]) + '</span><span class="role-group-count">' + recs.length + '</span></div>';
        for (var mi = 0; mi < recs.length; mi++) {
          var rec = recs[mi];
          var cur = viewEditedStatuses[rec.rowIndex] || rec.status;
          var edited = viewEditedStatuses[rec.rowIndex] && viewEditedStatuses[rec.rowIndex] !== viewOriginalStatuses[rec.rowIndex];
          h += '<div class="member-row"' + (edited ? ' style="background:var(--gold-100);border-radius:8px;padding:11px 10px"' : '') + '>'
            +    '<span class="member-name">' + esc(rec.name) + (edited ? ' <span class="prob-tag" style="background:var(--gold);color:#fff">EDITED</span>' : '') + '</span>'
            +    '<div class="status-five">'
            +      fiveBtn(rec.rowIndex, "P",  "Present",          cur)
            +      fiveBtn(rec.rowIndex, "LE", "Late Excused",     cur)
            +      fiveBtn(rec.rowIndex, "LU", "Late Unexcused",   cur)
            +      fiveBtn(rec.rowIndex, "AE", "Absent Excused",   cur)
            +      fiveBtn(rec.rowIndex, "AU", "Absent Unexcused", cur)
            +    '</div>'
            + '</div>';
        }
        h += '</div>';
      }
    }
    if (isDesktop) h += '</div>'; // close view-detail-grid
  }
  return h;
}

        +  '</div>'
        +  '<div style="display:flex;gap:2px">';
      h += probSegBar(d2, 6);
      h += '</div></div>';

function probStatusBadge(complete, failing, onTrack) {
  if (complete) return '<span style="font-family:var(--f-mono);font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:4px 8px;border-radius:4px;background:var(--gold);color:#fff">READY · EVAL</span>';
  if (failing)  return '<span style="font-family:var(--f-mono);font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:4px 8px;border-radius:4px;background:var(--crimson-100);color:var(--crimson-600)">AT RISK</span>';
  if (onTrack)  return '<span style="font-family:var(--f-mono);font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:4px 8px;border-radius:4px;background:var(--present-bg);color:var(--present)">ON TRACK</span>';
  return '<span style="font-family:var(--f-mono);font-size:9.5px;font-weight:700;letter-spacing:.12em;padding:4px 8px;border-radius:4px;background:var(--gold-100);color:var(--gold-700)">BEHIND</span>';
}

// Segment fill per session outcome (matches the attendance encoding):
// green = Present · yellow = Late (excused or unexcused) · grey = Absent Excused · red = Absent Unexcused
var PROB_SEG_COLOR = {
  "Present":          "var(--present)",
  "Late Excused":     "var(--late-exc)",
  "Late Unexcused":   "var(--late-exc)",
  "Absent Excused":   "var(--absent-exc)",
  "Absent Unexcused": "var(--absent-unexc)"
};

// Renders the segmented probation bar from d.sessionSequence (one coloured segment per
// completed session) plus d.pendingSlots outline segments for sessions not yet held.
// Falls back to the old attended-count fill if the backend predates sessionSequence.
function probSegBar(d, segH) {
  segH = segH || 8;
  var max = d.maxSessions || 10;
  var out = "";
  if (d.sessionSequence == null && d.pendingSlots == null) {
    var segColor = d.rate < 50 ? "var(--crimson)" : (d.rate >= (d.threshold || 80) ? "var(--present)" : "var(--gold)");
    for (var f = 0; f < max; f++) {
      out += '<div style="flex:1;height:' + segH + 'px;box-sizing:border-box;border-radius:2px;background:' + (f < (d.attended || 0) ? segColor : 'var(--paper-200)') + '"></div>';
    }
    return out;
  }
  var seq = d.sessionSequence || [];
  var pending = (d.pendingSlots != null) ? d.pendingSlots : Math.max(0, max - seq.length);
  for (var i = 0; i < seq.length; i++) {
    var c = PROB_SEG_COLOR[seq[i].status] || "var(--paper-300)";
    out += '<div title="' + esc(seq[i].status || "") + '" style="flex:1;height:' + segH + 'px;box-sizing:border-box;border-radius:2px;background:' + c + '"></div>';
  }
  for (var p = 0; p < pending; p++) {
    out += '<div title="Upcoming session" style="flex:1;height:' + segH + 'px;box-sizing:border-box;border-radius:2px;background:transparent;border:1px solid var(--paper-300)"></div>';
  }
  return out;
}

function probSegLegend() {
  var items = [["Present", "var(--present)"], ["Late", "var(--late-exc)"], ["Absent · exc.", "var(--absent-exc)"], ["Absent", "var(--absent-unexc)"]];
  var s = '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
  for (var i = 0; i < items.length; i++) {
    s += '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;background:' + items[i][1] + '"></span><span style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-500);letter-spacing:.04em">' + items[i][0] + '</span></span>';
  }
  s += '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:9px;height:9px;border-radius:2px;border:1px solid var(--paper-300)"></span><span style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-500);letter-spacing:.04em">Upcoming</span></span>';
  s += '</div>';
  return s;
}

function renderScoreboardContent() {

    if (scoreboardData.length >= 3) {
      var topThree = scoreboardData.slice(0, 3).map(function (m) { return Object.assign({}, m); });
      var counts = {};
      topThree.forEach(function (m) { var r = rankOf(m); counts[r] = (counts[r] || 0) + 1; });
      topThree.forEach(function (m) { if (counts[rankOf(m)] > 1) m._tied = true; });

      var s = scoreboardData[i];
      var rank = rankOf(s);
      var sc = s.statusCounts || {};
      var pCount = (sc.Present || 0);
      var lCount = (sc["Late Excused"] || 0) + (sc["Late Unexcused"] || 0);
      var aCount = (sc["Absent Excused"] || 0) + (sc["Absent Unexcused"] || 0);
      var initial = (s.name || '·').trim().charAt(0).toUpperCase();
      var section = (s.groups && s.groups[0]) || '';
      var tint = { Choir: '#F3E9CE', Band: '#F0E0CE', Orchestra: '#E1ECDF' }[section] || 'var(--paper-200)';
      var pcls = s.totalPoints > 0 ? "positive" : s.totalPoints < 0 ? "negative" : "zero";
      h += '<div class="sb-table-row">'
        +    '<span class="sb-rank" style="font-size:18px;color:' + (rank <= 3 ? 'var(--gold-700)' : 'var(--ink-400)') + '">' + romanOrNum(rank) + '</span>'
        +    '<div style="display:flex;align-items:center;gap:10px">' + memberAvatar(s.profilePhoto, initial, { size: 28, font: 13, bg: tint }) + '<div><div style="font-size:12.5px;font-weight:600;color:var(--ink)">' + esc(s.name) + '</div><div style="font-family:var(--f-mono);font-size:9.5px;color:var(--ink-400);letter-spacing:.06em">' + esc(section).toUpperCase() + '</div></div></div>'
        +    '<div style="display:flex;gap:8px">'
        +      '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:5px;height:5px;border-radius:999px;background:var(--present)"></span><span style="font-family:var(--f-mono);font-size:11px;color:var(--ink-700);font-weight:600">' + pCount + '</span></span>'
        +      '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:5px;height:5px;border-radius:999px;background:var(--late-exc)"></span><span style="font-family:var(--f-mono);font-size:11px;color:var(--ink-700);font-weight:600">' + lCount + '</span></span>'
        +      '<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:5px;height:5px;border-radius:999px;background:var(--absent-unexc)"></span><span style="font-family:var(--f-mono);font-size:11px;color:var(--ink-700);font-weight:600">' + aCount + '</span></span>'
        +    '</div>'
        +    '<span style="font-family:var(--f-mono);font-size:11px;font-weight:600;color:' + (s.offenseCount > 0 ? 'var(--crimson-600)' : 'var(--ink-400)') + '">' + (s.offenseCount > 0 ? s.offensePts : '—') + '</span>'
        +    '<span style="font-family:var(--f-mono);font-size:11px;font-weight:600;color:' + (s.probPenalty < 0 ? 'var(--crimson-600)' : 'var(--ink-400)') + '">' + (s.probPenalty < 0 ? s.probPenalty : '—') + '</span>'
        +    '<span class="sb-points ' + pcls + '" style="font-size:18px;text-align:right">' + s.totalPoints + '</span>'
        + '</div>';
    }
    h += '</div></div></div>';
    c.innerHTML = h;
    return;
  }

  // Mobile: row list (with podium)
  var h2 = '';
  if (scoreboardData.length >= 3) {
    var tt = scoreboardData.slice(0, 3).map(function (m) { return Object.assign({}, m); });
    var cnts = {};
    tt.forEach(function (m) { var r = rankOf(m); cnts[r] = (cnts[r] || 0) + 1; });
    tt.forEach(function (m) { if (cnts[rankOf(m)] > 1) m._tied = true; });
    h2 += renderPodiumHero(tt);
  }
  for (var j = 0; j < scoreboardData.length; j++) {
    var s2 = scoreboardData[j];
    var rank2 = rankOf(s2);
    var podium = rank2 <= 3 ? " podium" : "";
    var pcls2 = s2.totalPoints > 0 ? "positive" : s2.totalPoints < 0 ? "negative" : "zero";
    h2 += '<div class="sb-row' + podium + '">'
      +    '<span class="sb-rank">' + romanOrNum(rank2) + '</span>'
      +    '<div class="sb-info">'
      +      '<span class="sb-name">' + esc(s2.name) + '</span>'
      +      '<span class="sb-detail">' + s2.groups.join(" · ").toUpperCase() + ' · ' + s2.totalDays + ' DAYS</span>'
      +      '<div class="sb-breakdown">'
      +        '<span>ATT ' + (s2.attPoints >= 0 ? "+" : "") + s2.attPoints + '</span>'
      +        (s2.consecPenalty !== 0  ? '<span style="color:var(--crimson-600)">CONSEC ' + s2.consecPenalty + '</span>' : '')
      +        (s2.offenseCount > 0     ? '<span style="color:var(--crimson-600)">OFF · ' + s2.offenseCount + ' · ' + s2.offensePts + '</span>' : '')
      +        (s2.probPenalty          ? '<span style="color:var(--crimson-600)">PROB ' + s2.probPenalty + '</span>' : '')
      +      '</div>'
      +    '</div>'
      +    '<span class="sb-points ' + pcls2 + '">' + s2.totalPoints + '</span>'
      + '</div>';
  }
  c.innerHTML = h2;
}

function renderPodiumHero(top3) {
  // Heights and styling come from ACTUAL rank only — so tied positions
  // render identically (same step height, same rim colour, same numeral).
  // The visual "centre" arrangement keeps #1 in the middle when it's there.
  var rankOf = function (m) { return sbRankMode === 'competitive' ? m.compRank : m.denseRank; };
  var styleFor = function (r) {
    if (r === 1) return { pos: 'gold',   h: 100, big: true,  hasStar: true };
    if (r === 2) return { pos: 'silver', h: 75,  big: false, hasStar: false };
    if (r === 3) return { pos: 'bronze', h: 56,  big: false, hasStar: false };
    return                  { pos: 'silver', h: 56,  big: false, hasStar: false };
  };
  // Arrange: top3[1] · top3[0] · top3[2]  → #1 in centre when present.
  var spots = [
    Object.assign({ row: top3[1] }, styleFor(rankOf(top3[1])), { num: romanOrNum(rankOf(top3[1])) }),
    Object.assign({ row: top3[0] }, styleFor(rankOf(top3[0])), { num: romanOrNum(rankOf(top3[0])) }),
    Object.assign({ row: top3[2] }, styleFor(rankOf(top3[2])), { num: romanOrNum(rankOf(top3[2])) }),
  ];

  var h = '<div class="podium-hero">';
  for (var i = 0; i < spots.length; i++) {
    var sp = spots[i], m = sp.row;
    var initial = (m.name || '·').trim().charAt(0).toUpperCase();
    var section = (m.groups && m.groups[0]) || '';
    var avSize  = sp.big ? 46 : 38;
    var avFont  = sp.big ? 22 : 18;
    var tieTag  = (m._tied ? ' <span class="prob-tag" style="font-size:8px;padding:1px 5px;background:var(--gold-100);color:var(--gold-700)">TIED</span>' : '');
    h += '<div class="podium-col ' + sp.pos + '">';
    h += sp.hasStar ? '<span class="podium-star">✦</span>' : '<span class="podium-star" style="visibility:hidden">✦</span>';
    h += memberAvatar(m.profilePhoto, initial, { cls: 'podium-avatar', size: avSize, font: avFont, extra: 'margin-bottom:6px' });
    h += '<div class="podium-name" style="font-size:' + (sp.big ? 14 : 12) + 'px">' + esc(m.name) + tieTag + '</div>';
    h += '<div class="podium-section">' + esc(section).toUpperCase() + '</div>';
    h += '<div class="podium-pts" style="font-size:' + (sp.big ? 22 : 18) + 'px">' + m.totalPoints + '</div>';
    h += '<div class="podium-pts-label">PTS</div>';
    h += '<div class="podium-block" style="height:' + sp.h + 'px"><span class="podium-block-num" style="font-size:' + (sp.big ? 30 : 22) + 'px">' + sp.num + '</span></div>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

// Level-1 buckets: every queue row is an apology, a transfer, or a change.
var requestTypeFilter = "all";
function reqBucket(a) {
  if (a.type === "Section Transfer") return "transfers";
  if (a.type === "Name Change" || a.type === "Restart Probation" || a.type === "Course Details") return "changes";
  return "apologies";
}
function requestTypeChips() {
  var counts = { all: apologyQueue.length, apologies: 0, transfers: 0, changes: 0 };
  for (var i = 0; i < apologyQueue.length; i++) counts[reqBucket(apologyQueue[i])]++;
  var defs = [["all", "All"], ["apologies", "Apologies"], ["transfers", "Transfers"], ["changes", "Changes"]];
  var h = '<div class="req-type-toggle">';
  for (var d = 0; d < defs.length; d++) {
    h += '<button class="' + (requestTypeFilter === defs[d][0] ? 'active' : '') + '" onclick="setRequestTypeFilter(&#39;' + defs[d][0] + '&#39;)">'
      + defs[d][1] + '<span class="cnt">' + counts[defs[d][0]] + '</span></button>';
  }
  return h + '</div>';
}
function setRequestTypeFilter(t) { requestTypeFilter = t; selectedApologyIdx = null; refreshRequestsChrome(); renderApologyQueueContent(); }

var apologyFilter = "Pending";
function apologyFilterChips() {
  var filters = ["Pending", "Approved", "Rejected", "All"];
  var chips = '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  for (var fi = 0; fi < filters.length; fi++) {
    chips += '<button class="chip' + (apologyFilter === filters[fi] ? " active" : "") + '" style="padding:5px 12px;font-size:11.5px" onclick="setApologyFilter(&#39;' + filters[fi] + '&#39;)">' + filters[fi] + '</button>';
  }
  return chips + '</div>';
}
function setApologyFilter(f) { apologyFilter = f; selectedApologyIdx = null; refreshRequestsChrome(); renderApologyQueueContent(); }
function apologyMatchesFilter(a) {
  if (requestTypeFilter !== "all" && reqBucket(a) !== requestTypeFilter) return false;
  if (apologyFilter === "All") return true;
  if (apologyFilter === "Pending")  return a.status === "Pending";
  if (apologyFilter === "Approved") return a.status === "Approved" || a.status === "Applied";
  if (apologyFilter === "Rejected") return a.status === "Rejected" || a.status === "Revoked";
  return true;
}

function renderApologyQueueContent() {

    if (selectedApologyIdx === null && apologyQueue.length > 0) {

  var c = document.getElementById("apologyQueueContent");

        + '</div>';
    } else {

          h += '<button class="btn-export" style="border-color:var(--present);color:var(--present)" onclick="approveCourseDetailsChange(' + a.rowIndex + ',\'' + esc(a.name).replace(/'/g, "\\'") + '\')">Approve change</button>';

        }
        h += '<button class="btn-export" style="border-color:var(--crimson);color:var(--crimson-600)" onclick="adminReject(' + a.rowIndex + ')">Reject</button>';

function parseRequest(a) {
  var r = { cleanReason: (a.reason || "").trim(), before: null, after: null };
  var s = a.reason || "";
  if (a.type === "Section Transfer") {
    var m = s.match(/From:\s*([\s\S]*?)\s*\|\s*To:\s*([\s\S]*?)\s*\|\s*Reason:\s*([\s\S]*)$/);
    if (m) { r.before = m[1].trim(); r.after = m[2].trim(); r.cleanReason = m[3].trim(); }
    else if (a.endDate) { r.after = ("" + a.endDate).trim(); }
  } else if (a.type === "Name Change") {
    var m2 = s.match(/^([\s\S]*?)\s*\|\s*New name:\s*([\s\S]*)$/);
    if (m2) { r.cleanReason = m2[1].trim(); r.after = m2[2].trim(); }
    else { r.after = ("" + (a.endDate || "")).trim(); }
    r.before = a.name || "";
  } else if (a.type === "Course Details") {
    var m3 = s.match(/Faculty:\s*([\s\S]*?)\s*\|\s*Course:\s*([\s\S]*?)\s*\|\s*Year:\s*([\s\S]*?)\s*\|\s*Reason:\s*([\s\S]*)$/);
    if (m3) {
      r.after = courseLine(m3[1].trim(), m3[2].trim(), m3[3].trim());
      r.cleanReason = m3[4].trim();
    }
    r.before = courseLine(a.oldCourseFaculty, a.oldCourseName, a.oldYearOfStudy);
  }
  return r;
}
function courseLine(fac, course, yr) {
  yr = ("" + (yr || "")).trim();
  return [("" + (fac || "")).trim(), ("" + (course || "")).trim(),
          (yr && yr !== "\u2014") ? "Year " + yr : ""]
    .filter(function (x) { return x && x !== "\u2014"; }).join(" \u00b7 ");
}
function toGroupArr(str) {
  return (str || "").split(",").map(function (x) { return x.trim(); }).filter(Boolean);
}

function renderApologyDetail() {
  var c = document.getElementById("apologyDetailPane");
  if (!c) return;
  if (selectedApologyIdx === null || !apologyQueue[selectedApologyIdx]) {
    c.innerHTML = '<div class="empty-pane">Select a request to review it.</div>';
    return;
  }
  var a = apologyQueue[selectedApologyIdx];
  var stColor = a.status === "Applied" || a.status === "Approved" ? "var(--present)"
              : a.status === "Rejected" || a.status === "Revoked" ? "var(--crimson-600)"
              : "var(--gold-700)";
  var statusLabel = a.status === "Pending" ? (a.onTime ? "ON TIME" : "PENDING \u00b7 LATE SUBMISSION") : a.status.toUpperCase();
  if (a.status === "Pending" && a.type === "Section Transfer") statusLabel = "PENDING \u00b7 TRANSFER REQUEST";
  if (a.status === "Pending" && a.type === "Name Change")      statusLabel = "PENDING \u00b7 NAME CHANGE";
  if (a.status === "Pending" && a.type === "Course Details")   statusLabel = "PENDING \u00b7 ACADEMIC DETAILS";

  var h = '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:20px">'

        +     '<h2 style="margin-top:4px">' + esc(a.name) + '</h2>'
        +   '</div>'
        +   '<span style="font-family:var(--f-mono);font-size:10px;font-weight:700;letter-spacing:.14em;padding:6px 10px;border-radius:4px;background:' + (a.onTime ? 'var(--present-bg)' : 'var(--gold-100)') + ';color:' + stColor + ';white-space:nowrap">' + statusLabel + '</span>'
        + '</div>';

  var pr = parseRequest(a);

  // Reason card
  h += '<div style="background:var(--paper-100);border:1px solid var(--paper-200);border-radius:14px;padding:20px 24px;margin-bottom:20px">'
    +    '<div class="eyebrow" style="margin-bottom:10px">Reason</div>'
    +    '<div class="display" style="font-size:22px;line-height:1.3">"' + esc(pr.cleanReason || a.reason) + '"</div>'
    + '</div>';

  // Consequence preview — branches by request type
  if (a.status === "Pending" && a.type === "Section Transfer") {
    var fromG = toGroupArr(pr.before);
    var toG   = toGroupArr(pr.after);
    h += '<div class="eyebrow" style="margin-bottom:8px">If you approve</div>'
      +  '<div class="consequence-preview">'
      +    groupChipRow(fromG.length ? fromG : ['\u2014'])

      +    groupChipRow(toG.length ? toG : ['\u2014'], true)

  } else if (a.status === "Pending" && a.type === "Name Change") {
    var oldN = pr.before || a.name || '';
    var newN = pr.after || '';
    h += '<div class="eyebrow" style="margin-bottom:8px">If you approve</div>'
      +  '<div class="consequence-preview">'
      +    '<span style="font-size:14px;color:var(--ink-500);text-decoration:line-through">' + esc(oldN) + '</span>'
      +    '<span class="consequence-arrow">\u2192</span>'
      +    '<span style="font-size:15px;font-weight:600;color:var(--ink)">' + esc(newN) + '</span>'
      + '</div>';
  } else if (a.status === "Pending" && a.type === "Course Details") {
    var oldC = pr.before || '';
    var newC = pr.after || '';
    h += '<div class="eyebrow" style="margin-bottom:8px">If you approve</div>'
      +  '<div class="consequence-preview">'
      +    (oldC ? '<span style="font-size:14px;color:var(--ink-500);text-decoration:line-through">' + esc(oldC) + '</span>'
      +            '<span class="consequence-arrow">\u2192</span>' : '')
      +    '<span style="font-size:15px;font-weight:600;color:var(--ink)">' + esc(newC || '\u2014') + '</span>'
      + '</div>';
  } else if (a.status === "Pending" && (a.type === "Late" || a.type === "Absent" || a.type === "Long-term")) {
    var fromStatus = a.type === "Late" ? "Late Unexcused" : "Absent Unexcused";
    var toStatus   = a.type === "Late" ? "Late Excused"   : "Absent Excused";
    h += '<div class="eyebrow" style="margin-bottom:8px">If you approve</div>'
      +  '<div class="consequence-preview">'
      +    '<span class="status-badge Absent">' + fromStatus + '</span>'
      +    '<span class="consequence-arrow">\u2192</span>'
      +    '<span class="status-badge Present">' + toStatus + '</span>'
      + '</div>';
  }

  // Inline review note (replaces the prompt popup)
  if (a.status === "Pending") {
    h += '<div style="margin-top:20px">'
      +    '<div class="eyebrow" style="margin-bottom:8px">Review note (optional)</div>'
      +    '<textarea id="apologyNote" placeholder="Add a note — shown to the member and kept on record." style="min-height:70px;resize:vertical;font-style:normal"></textarea>'
      + '</div>';
  }

  // Actions
  if (a.status === "Pending") {
    h += '<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">'
      +    '<button class="btn btn-secondary" style="padding:10px 18px;font-size:13px" onclick="selectApology(null)">Skip</button>';
    if (a.type === "Restart Probation") {
      h += '<button class="btn btn-primary" style="padding:10px 22px;font-size:13px" onclick="adminApproveRestart(\'' + esc(a.name).replace(/'/g, "\\'") + '\',' + a.rowIndex + ')">Approve restart</button>';
    } else if (a.type === "Section Transfer") {
      h += '<button class="btn btn-crimson" style="padding:10px 18px;font-size:13px" onclick="adminReject(' + a.rowIndex + ')">Reject</button>';
      h += '<button class="btn btn-primary" style="padding:10px 22px;font-size:13px" onclick="approveSectionTransfer(' + a.rowIndex + ',\'' + esc(a.name).replace(/'/g, "\\'") + '\')">Approve transfer</button>';
    } else if (a.type === "Name Change") {
      h += '<button class="btn btn-crimson" style="padding:10px 18px;font-size:13px" onclick="adminReject(' + a.rowIndex + ')">Reject</button>';
      h += '<button class="btn btn-primary" style="padding:10px 22px;font-size:13px" onclick="approveNameChange(' + a.rowIndex + ',\'' + esc(a.name).replace(/'/g, "\\'") + '\')">Approve name change</button>';
    } else if (a.type === "Course Details") {
      h += '<button class="btn btn-crimson" style="padding:10px 18px;font-size:13px" onclick="adminReject(' + a.rowIndex + ')">Reject</button>';
      h += '<button class="btn btn-primary" style="padding:10px 22px;font-size:13px" onclick="approveCourseDetailsChange(' + a.rowIndex + ',\'' + esc(a.name).replace(/'/g, "\\'") + '\')">Approve change</button>';
    } else {
      h += '<button class="btn btn-crimson" style="padding:10px 18px;font-size:13px" onclick="adminReject(' + a.rowIndex + ')">Reject</button>';
      h += '<button class="btn btn-primary" style="padding:10px 22px;font-size:13px" onclick="adminApprove(' + a.rowIndex + ')">Approve</button>';
    }
    h += '</div>';
  } else if (a.reviewNote) {
    h += '<div style="margin-top:18px;padding:12px 14px;background:var(--paper-100);border-radius:10px">'
      +    '<div class="eyebrow" style="margin-bottom:6px">Review note</div>'
      +    '<div style="font-size:12.5px;color:var(--ink-700)">' + esc(a.reviewNote) + '</div>'
      + '</div>';
  }

  c.innerHTML = h;
}

// Reads the inline review note if present (desktop), else falls back to prompt (mobile)
function getReviewNote(promptLabel) {
  var el = document.getElementById("apologyNote");
  if (el) return el.value || "";
  var p = prompt(promptLabel);
  return p === null ? null : (p || "");
}
function updateChangesBar() {
  var c = getChangeCount();
  var bar = document.getElementById("changesBar");
  if (c === 0) { if (bar) bar.remove(); return; }
  if (!bar) {
    bar = document.createElement("div");
    bar.id = "changesBar";
    bar.className = "changes-bar";
    document.body.appendChild(bar);
  }

  // Session metadata line: "TUE 26 MAY · CHOIR"
  var meta = "";
  if (viewCurrentDate) {
    meta = formatDateDisplay(viewCurrentDate).replace(/ · /, " ").toUpperCase();
  }
  if (viewGroup && viewGroup !== "All") meta += (meta ? " · " : "") + viewGroup.toUpperCase();
  else if (viewGroup === "All") meta += (meta ? " · " : "") + "ALL GROUPS";

  // Build edit chips from actual diffs
  var nameByRow = {};
  for (var ri = 0; ri < viewRecords.length; ri++) nameByRow[viewRecords[ri].rowIndex] = viewRecords[ri].name;
  var chips = [];
  for (var k in viewEditedStatuses) {
    if (viewEditedStatuses[k] === viewOriginalStatuses[k]) continue;
    chips.push({
      name: nameByRow[k] || "Member",
      from: viewOriginalStatuses[k],
      to: viewEditedStatuses[k],
    });
  }
  var MAX = 3;
  var chipsHtml = "";
  for (var i = 0; i < Math.min(chips.length, MAX); i++) {
    var ch = chips[i];
    chipsHtml += '<div class="changes-chip">'
      +   '<div class="chip-name">' + esc(ch.name.split(" ")[0]) + '</div>'
      +   '<div class="chip-diff">' + esc(shortStatus(ch.from)) + ' \u2192 <span class="to">' + esc(shortStatus(ch.to)) + '</span></div>'
      + '</div>';
  }
  var moreHtml = chips.length > MAX ? '<span class="changes-chips-more">+' + (chips.length - MAX) + '</span>' : '';

  bar.innerHTML =
      '<div class="changes-summary">'
    +   '<span class="num-big">' + c + '</span>'
    +   '<div class="summary-text">'
    +     '<div class="lead">unsaved edit' + (c > 1 ? 's' : '') + '</div>'
    +     (meta ? '<div class="meta">' + meta + '</div>' : '')
    +   '</div>'
    + '</div>'
    + '<div class="changes-divider"></div>'
    + '<div class="changes-chips">' + chipsHtml + '</div>'
    + moreHtml
    + '<div class="changes-actions">'
    +   '<button onclick="discardChanges()">Discard</button>'
    +   '<button class="btn-save" id="btnSaveChanges" onclick="saveChanges()">Save changes</button>'
    + '</div>';
}

// Compact status label for edit chips
function shortStatus(s) {
  return s === "Present" ? "Present"
       : s === "Late Excused" ? "Late Exc"
       : s === "Late Unexcused" ? "Late Unexc"
       : s === "Absent Excused" ? "Absent Exc"
       : s === "Absent Unexcused" ? "Absent Unexc" : s;
}

function renderAmRoleFields() {
  var boxes = document.querySelectorAll('#amGroupBoxes .am-group-box');
  for (var i = 0; i < boxes.length; i++) {
    var box = boxes[i];
    var grp = box.getAttribute('data-group');
    var cb = box.querySelector('input[type="checkbox"]');
    var slot = box.querySelector('.am-role-slot');
    box.className = 'am-group-box' + (cb.checked ? ' checked' : '');
    if (!cb.checked) { slot.innerHTML = ''; continue; }
    var id = 'amRole_' + grp;
    var existing = document.getElementById(id);
    var val = existing ? existing.value : '';
    var listKey = grp === 'Choir' ? 'choirParts' : grp === 'Band' ? 'bandRoles' : 'orchestraRoles';
    var label   = grp === 'Choir' ? 'Choir part' : grp + ' role';
    var options = cfgList(listKey, grp === 'Choir' ? ['Soprano', 'Alto', 'Tenor', 'Bass'] : []);
    var opts = '<option value="">Select ' + (grp === 'Choir' ? 'part' : 'role') + '…</option>';
    for (var p = 0; p < options.length; p++) {
      opts += '<option value="' + esc(options[p]) + '"' + (val === options[p] ? ' selected' : '') + '>' + esc(options[p]) + '</option>';
    }
    slot.innerHTML = '<label class="form-label">' + label + '</label><select id="' + id + '" onchange="renderAddMemberPreview()">' + opts + '</select>';
  }
  renderAddMemberPreview();
}

function updateProbationCalc() {
  var startEl = document.getElementById('amProbStart');
  var endEl = document.getElementById('amProbEnd');
  if (!startEl || !endEl) return;
  if (!startEl.value) { endEl.textContent = '— · 10 sessions'; renderAddMemberPreview(); return; }
  // Estimate: 10 sessions at ~2 sessions/week ≈ 5 weeks
  var parts = startEl.value.split('-');
  var d = new Date(parts[0], parts[1] - 1, parts[2]);
  d.setDate(d.getDate() + 35);
  var mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  endEl.textContent = '≈ ' + d.getDate() + ' ' + mn[d.getMonth()] + ' ' + d.getFullYear() + ' · 10 sessions';
  renderAddMemberPreview();
}

function renderMemberList() {
  var c = document.getElementById("memberListContent");

  });

    c.innerHTML = '<p class="loading">' + (memberListData.length === 0 ? 'No members yet.' : 'No matches.') + '</p>';

  var h = '<div class="member-count">' + f.length + ' OF ' + memberListData.length + ' SHOWN</div>';

  h += '<div class="roster-table">';

    }).join(' ');
    var rate = 60 + ((m.name.charCodeAt(0) * 13) % 38);
    var barColor = rate >= 80 ? 'var(--present)' : rate >= 60 ? 'var(--gold)' : 'var(--crimson)';
    var statusTag = m.probation

      +    '<div style="display:flex;gap:4px;flex-wrap:wrap">' + groupTags + '</div>'
      +    '<div class="att-bar"><div class="att-bar-track"><div class="att-bar-fill" style="width:' + rate + '%;background:' + barColor + '"></div></div><span class="att-bar-label">' + rate + '%</span></div>'
      +    '<div style="text-align:right">' + statusTag + '</div>'

  for (var j = 0; j < f.length; j++) {

      + (m2.probationFailed   ? ' <span class="inactive-tag">Failed</span>' : "");

      rd2.push(rl2 && rl2 !== "Other" ? grp2.toUpperCase() + " \u00b7 " + rl2 : grp2.toUpperCase());
    }
    var sel2 = (selectedMemberName === m2.name) ? ' style="border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)"' : '';
    var safeName2 = esc(m2.name).replace(/'/g, "\\'");

      +    '<div class="member-list-info">'

      +      (m2.email ? '<span class="member-list-detail">' + esc(m2.email) + '</span>' : '')
      +    '</div>'
      + '</div>';

  c.innerHTML = h;

var selectedMemberName = null;
function selectMember(name) {
  selectedMemberName = name;
  renderMemberList();
  renderMemberDetail();
  // Mobile master-detail: bring the member's detail into view instead of
  // letting it render far below the list. Swap the list out for the detail
  // and scroll back to the top so the profile starts where the user is looking.
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  if (!isDesktop) {
    var pane = document.getElementById("membersRosterPane");
    if (pane) pane.classList.add("detail-open");
    window.scrollTo(0, 0);
  }
}

// Mobile: return from a member's detail back to the roster list.

  renderMemberDetail();
  window.scrollTo(0, 0);
}

      +    '</div>'
      +    '<div style="height:6px;border-radius:4px;background:#fff;overflow:hidden;margin-bottom:10px">'
      +      '<div style="width:' + pRate + '%;height:100%;background:' + pColor + '"></div>'

      +    '<div style="font-size:11.5px;color:var(--ink-700)">'
      +      (m.probationStart ? 'Started ' + esc(m.probationStart) + '. ' : '')

      +    '</div>'
      + '</div>';
  } else if (m.probationPassed) {
    h += '<div class="eyebrow" style="margin-bottom:6px;font-size:9.5px">Probation</div>'

      +      '<span style="font-size:12.5px;font-weight:600;color:var(--present)">Passed</span>'
      +      (m.probationPenalty < 0 ? '<span style="font-family:var(--f-mono);font-size:10px;color:var(--crimson-600);letter-spacing:.1em">PENALTY ' + m.probationPenalty + ' PTS</span>' : '')
      +    '</div>'
      +    (m.probationStart ? '<div style="font-size:12px;color:var(--ink-700);margin-top:6px">Started ' + esc(m.probationStart) + '</div>' : '')
      +    (m.probationEnd   ? '<div style="font-size:12px;color:var(--ink-700)">Completed ' + esc(m.probationEnd) + '</div>'  : '')
      + '</div>';
  } else if (m.probationFailed) {
    h += '<div class="eyebrow" style="margin-bottom:6px;font-size:9.5px">Probation</div>'
      +  '<div style="padding:14px 16px;background:var(--crimson-100);border-radius:10px;margin-bottom:14px">'
      +    '<div style="font-size:12.5px;font-weight:600;color:var(--crimson-600)">Did not pass</div>'
      +    (m.probationStart ? '<div style="font-size:12px;color:var(--ink-700);margin-top:6px">Started ' + esc(m.probationStart) + '</div>' : '')
      +    '<div style="font-size:12px;color:var(--ink-700);margin-top:4px">Below the minimum attendance requirement. Account deactivated.</div>'
      + '</div>';
  }

  // Actions
  h +=   '<div style="display:flex;gap:8px">'
    +      '<button class="btn btn-secondary" style="flex:1;padding:9px 14px;font-size:12.5px" onclick="showEditProfile(\'' + esc(m.name).replace(/'/g, "\\'") + '\')">Edit profile</button>'
    +      '<button class="btn btn-crimson"   style="flex:1;padding:9px 14px;font-size:12.5px" onclick="prefillOffense(\'' + esc(m.name).replace(/'/g, "\\'") + '\')">Record offense</button>'
    +    '</div>'
    + '</div>';
  c.innerHTML = h;
}

// ─── ADMIN EDIT PROFILE ───────────────────────────────────────────────────

function showEditProfile(name) {
  selectedMemberName = name;
  var isDesktop = window.matchMedia && window.matchMedia('(min-width: 1024px)').matches;
  if (!isDesktop) {
    var pane = document.getElementById('membersRosterPane');
    if (pane) pane.classList.add('detail-open');
    window.scrollTo(0, 0);
  }
  var c = document.getElementById('memberDetailPane');
  if (c) c.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading profile\u2026</div></div>';
  google.script.run
    .withSuccessHandler(renderEditProfile)
    .withFailureHandler(function(e) { showToast(e.message, 'error'); renderMemberDetail(); })
    .getMemberForEdit(name);
}

function closeEditProfile() { renderMemberDetail(); }

function epCheckNameChange() {
  var orig = document.getElementById('epOriginalName');
  var cur = document.getElementById('epName');
  var warn = document.getElementById('epNameWarning');
  if (!orig || !cur || !warn) return;
  warn.style.display = cur.value.trim() !== orig.value.trim() ? 'block' : 'none';
}

function epUpdateRoleSlots() {
  ['Choir','Band','Orchestra'].forEach(function(g) {
    var cb = document.getElementById('epGroup_' + g);
    var slot = document.getElementById('epRoleSlot_' + g);
    if (cb && slot) slot.style.display = cb.checked ? 'block' : 'none';
  });
}

function toggleEditProfileDetails() {
  var s = document.getElementById('epDetailSection');
  var b = document.getElementById('epDetailToggle');
  if (!s || !b) return;
  var open = s.style.display !== 'none';
  s.style.display = open ? 'none' : 'block';
  b.innerHTML = (open ? '\u25b8 Show detailed info' : '\u25be Hide detailed info');
}

function submitEditProfile() {
  var orig = document.getElementById('epOriginalName');
  if (!orig) return;
  var nameVal = (document.getElementById('epName') || {}).value || '';
  if (!nameVal.trim()) { showToast('Name is required.', 'error'); return; }
  var groups = [];
  ['Choir','Band','Orchestra'].forEach(function(g) {
    var cb = document.getElementById('epGroup_' + g);
    if (cb && cb.checked) groups.push(g);
  });
  if (groups.length === 0) { showToast('At least one group is required.', 'error'); return; }
  var payload = {
    originalName: orig.value,
    name:   nameVal.trim(),
    email:  (document.getElementById('epEmail') || {}).value || '',
    phone:  (document.getElementById('epPhone') || {}).value || '',
    admNo:  (document.getElementById('epAdmNo') || {}).value || '',
    groups: groups,
    choirPart:      (document.getElementById('epRole_Choir') || {}).value || '',
    bandRole:       (document.getElementById('epRole_Band') || {}).value || '',
    orchestraRole:  (document.getElementById('epRole_Orchestra') || {}).value || ''
  };
  // Include details if the detail section was opened (or always)
  var ds = document.getElementById('epDetailSection');
  payload.details = {
    courseFaculty:    (document.getElementById('epFaculty') || {}).value || '',
    courseName:       (document.getElementById('epCourse') || {}).value || '',
    nationality:      (document.getElementById('epNationality') || {}).value || '',
    residence:        (document.getElementById('epResidence') || {}).value || '',
    dateOfBirth:      (document.getElementById('epDob') || {}).value || '',
    gender:           (document.getElementById('epGender') || {}).value || '',
    yearOfStudy:      (document.getElementById('epYear') || {}).value || '',
    passportNumber:   (document.getElementById('epPassport') || {}).value || '',
    nationalIdNumber: (document.getElementById('epNatId') || {}).value || '',
    nokName:          (document.getElementById('epNokName') || {}).value || '',
    nokPhone:         (document.getElementById('epNokPhone') || {}).value || '',
    nokRelationship:  (document.getElementById('epNokRel') || {}).value || '',
    nokResidence:     (document.getElementById('epNokRes') || {}).value || ''
  };
  var btn = document.getElementById('btnSaveProfile');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving\u2026'; }
  google.script.run
    .withSuccessHandler(function(r) {
      showToast(r.name + ' updated.' + (r.renamed ? ' Name changed.' : ''), 'success');
      selectedMemberName = r.name;
      // Refresh member list then show the updated profile
      google.script.run.withSuccessHandler(function(list) {
        memberListData = list; renderMemberList(); renderMemberDetail();
      }).withFailureHandler(function() { renderMemberDetail(); }).getMemberList();
    })
    .withFailureHandler(function(e) {
      showToast('Error: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
    })
    .adminUpdateMember(payload);
}

function setMembersMode(mode) {
  var btns = document.querySelectorAll('#membersModeToggle button');
  for (var b = 0; b < btns.length; b++) btns[b].className = (btns[b].getAttribute('data-mode') === mode) ? 'active' : '';
  // Leaving the roster resets the mobile master-detail back to the list view.
  if (mode !== 'roster') {
    var rp = document.getElementById('membersRosterPane');
    if (rp) rp.classList.remove('detail-open');
  }
  var panes = { roster: 'membersRosterPane', member: 'membersMemberPane', scoreboard: 'membersScoreboardPane', add: 'membersAddPane', offense: 'membersOffensePane' };
  for (var k in panes) { var pe = document.getElementById(panes[k]); if (pe) pe.style.display = (k === mode) ? 'block' : 'none'; }
  if (mode === 'add') renderAddMemberPreview();
  // By member + Scoreboard folded in from the old View & Edit — reuse the existing render fns.
  if (mode === 'member') {
    var mr = document.getElementById('memberHistoryRoot');
    if (mr && !membersMemberInit && typeof renderByMemberView === 'function') {
      mr.innerHTML = renderByMemberView(); membersMemberInit = true;
      if (typeof loadMemberNames === 'function') loadMemberNames();
    }
  }
  if (mode === 'scoreboard') {
    var sr = document.getElementById('scoreboardRoot');
    if (sr && !membersScoreboardInit && typeof renderScoreboardView === 'function') {
      sr.innerHTML = renderScoreboardView(); membersScoreboardInit = true;
      if (typeof loadScoreboard === 'function') loadScoreboard();
    }
  }
  if (mode === 'offense') {
    var od = document.getElementById('offDate'); if (od && !od.value) od.value = todayStr();
    // Populate datalist of member names
    if (!memberNames || !memberNames.length) loadMemberNames();
    var dl = document.getElementById('offNameList');
    var names = (memberNames && memberNames.length) ? memberNames : memberListData.map(function (m) { return m.name; });
    if (dl) dl.innerHTML = names.map(function (n) { return '<option value="' + esc(n) + '"></option>'; }).join('');
    // Build a recent-offense log from member offense data if available
    loadOffenseLog();
  }
}

// Short date — "Tue · 26 May" (no year)
function formatDateShort(ds) {
  if (!ds) return "";
  var p = String(ds).split("-");
  if (p.length < 3) return esc(String(ds));
  var d = new Date(p[0], p[1] - 1, p[2]);
  var dn = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return dn[d.getDay()] + " · " + d.getDate() + " " + mn[d.getMonth()];
}

// "18:00" → "6:00 PM" (compact: "16:00" → "4 PM"). Pass-through for non-HH:MM strings.
function fmtTime12(t, compact) {
  if (!t) return "";
  var m = String(t).match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return esc(String(t));
  var hrs = parseInt(m[1], 10), mins = m[2];
  var ap = hrs >= 12 ? "PM" : "AM";
  hrs = hrs % 12 || 12;
  return (compact && mins === "00") ? (hrs + " " + ap) : (hrs + ":" + mins + " " + ap);
}

function statusShortLabel(st) {
  return st === "Late Excused"     ? "Late · Exc."
       : st === "Late Unexcused"   ? "Late · Unexc."
       : st === "Absent Excused"   ? "Absent · Exc."
       : st === "Absent Unexcused" ? "Absent"
       : esc(st);
}

  myAttNextInfo = info || null;

  var p = String(info.date).split("-");
  var mn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dateLine = p.length === 3 ? (parseInt(p[2], 10) + " " + mn[p[1] - 1]) : "";
  h += '<div class="display" style="font-size:24px;line-height:1.12;margin-top:8px">' + esc(info.dayName || "") + (dateLine ? '<br>' + dateLine : '') + '</div>'
    +  '<div style="font-size:12px;color:var(--ink-600);margin-top:10px;line-height:1.5">' + (info.kind ? esc(info.kind) + ' · ' : '') + fmtTime12(info.time)
    +    (info.venue ? '<br><span style="color:var(--ink-500)">' + esc(info.venue) + '</span>' : '')

  if (info.deadlinePassed) {

// Required onboarding fields (id → backend key). Role/part ids only count when present.
function obRequiredIds() {
  var ids = ['obFaculty','obCourse','obYearOfStudy','obNationality','obGender','obPhone','obResidence','obDOB','obPassport','obNokName','obNokPhone','obNokRel','obNokRes'];
  if (document.getElementById('obChoirPart'))     ids.push('obChoirPart');
  if (document.getElementById('obBandRole'))      ids.push('obBandRole');
  if (document.getElementById('obOrchestraRole')) ids.push('obOrchestraRole');
  return ids;
}

// Flag empty required fields so a resuming member sees exactly what’s missing.
function flagOnboardingRequired() {
  var ids = obRequiredIds();
  var missing = 0;
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (!el) continue;
    var empty = !el.value.trim();
    el.classList.toggle('needs-attention', empty);
    if (empty) missing++;
    if (!el.__obWired) {  // clear the flag as soon as they fill it
      el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', function () {
        this.classList.toggle('needs-attention', !this.value.trim());
        updateOnboardingMissingNote();
      });
      el.__obWired = true;
    }
  }
  // Photo counts as required unless one is already on file / uploaded.
  var photoMissing = !uploadedPassportUrl;
  var pv = document.getElementById('photoPreview');
  if (pv) pv.classList.toggle('needs-attention', photoMissing);
  if (photoMissing) missing++;
  setOnboardingMissingNote(missing);
}
function setOnboardingMissingNote(missing) {
  var note = document.getElementById('obMissingNote');
  if (!note) return;
  if (missing > 0) {
    note.textContent = missing + ' FIELD' + (missing === 1 ? '' : 'S') + ' STILL NEED ATTENTION';
    note.style.color = 'var(--crimson-600)';
  } else {
    note.textContent = 'ALL REQUIRED FIELDS COMPLETE \u2713';
    note.style.color = 'var(--present)';
  }
}
function updateOnboardingMissingNote() {
  var ids = obRequiredIds(), missing = 0;
  for (var i = 0; i < ids.length; i++) { var el = document.getElementById(ids[i]); if (el && !el.value.trim()) missing++; }
  if (!uploadedPassportUrl) missing++;
  setOnboardingMissingNote(missing);
}

function submitOnboarding() {
  var payload = {
    courseFaculty:    obVal("obFaculty"),
    courseName:       obVal("obCourse"),
    nationality:      obVal("obNationality"),
    phoneNumber:      obVal("obPhone"),
    residence:        obVal("obResidence"),
    dateOfBirth:      obVal("obDOB"),
    passportNumber:   obVal("obPassport"),
    nationalIdNumber: obVal("obNatID"),
    nokName:          obVal("obNokName"),
    nokPhone:         obVal("obNokPhone"),
    nokRelationship:  obVal("obNokRel"),
    nokResidence:     obVal("obNokRes"),
    gender:           obVal("obGender"),
    yearOfStudy:      obVal("obYearOfStudy"),
    photoUrl:         uploadedPassportUrl
  };
  var adm = obVal("obAdmNo");
  if (adm) payload.admissionNumber = adm;  // optional confirm
  // Role/part confirm fields — only present for the groups the member is in.
  if (document.getElementById("obChoirPart"))     payload.choirPart     = obVal("obChoirPart");
  if (document.getElementById("obBandRole"))      payload.bandRole      = obVal("obBandRole");
  if (document.getElementById("obOrchestraRole")) payload.orchestraRole = obVal("obOrchestraRole");

  // Required: every flagged field + applicable role/part + a photo on file.
  var ids = obRequiredIds(), missing = [];
  for (var i = 0; i < ids.length; i++) { var el = document.getElementById(ids[i]); if (el && !el.value.trim()) missing.push(el); }
  flagOnboardingRequired();
  if (missing.length || !uploadedPassportUrl) {
    showToast("Please complete the highlighted fields.", "error");
    if (missing[0] && missing[0].focus) missing[0].focus();
    return;
  }
  var btn = document.getElementById("btnOnboarding");
  btn.disabled = true; btn.textContent = "Submitting\u2026";
  google.script.run.withSuccessHandler(function () {
    showToast("Onboarding complete \u2014 welcome!", "success");
    myAttLoaded = false; loadMyAttendance();
  }).withFailureHandler(function (e) {
    btn.disabled = false; btn.textContent = "Complete onboarding";
    showToast("Failed: " + e.message, "error");
  }).submitOnboarding(payload);
}

// Shared photo-to-server helper (reads file, strips the data-URL prefix, sends base64)
var uploadedPassportUrl = "";  // captured Drive URL for the onboarding payload

function handlePhotoUpload(input, statusId, serverFn, previewId) {
  var f = input.files && input.files[0];
  var st = document.getElementById(statusId);
  if (!f) return;
  if (st) { st.textContent = "Uploading\u2026"; st.style.color = "var(--ink-500)"; }
  var reader = new FileReader();
  reader.onload = function () {
    var dataUrl = reader.result;
    if (previewId) { var pv = document.getElementById(previewId); if (pv) pv.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover">'; }
    var base64 = dataUrl.split(",")[1];
    google.script.run.withSuccessHandler(function (r) {
      if (st) { st.textContent = "Uploaded \u2713"; st.style.color = "var(--present)"; }
      if (serverFn === "uploadPassportPhoto" && r && r.url) {
        uploadedPassportUrl = r.url;
        var pv = document.getElementById("photoPreview");
        if (pv) pv.classList.remove("needs-attention");
        if (typeof updateOnboardingMissingNote === "function") updateOnboardingMissingNote();
      }
      if (serverFn === "uploadProfilePhoto" && r && r.url) { if (profileData) profileData.profilePhoto = r.url; applyAvatarPhoto(); }
    }).withFailureHandler(function () {
      if (st) { st.textContent = "Upload failed \u2014 try again"; st.style.color = "var(--crimson-600)"; }
    })[serverFn](base64, f.name, f.type);
  };
  reader.readAsDataURL(f);
}
function onPassportPhoto(input) { handlePhotoUpload(input, "obPhotoStatus", "uploadPassportPhoto", "photoPreview"); }
function onProfilePhoto(input) {
  handlePhotoUpload(input, "profPhotoStatus", "uploadProfilePhoto");
}

// Diff against the loaded profile and route each change to the right server call.
function saveProfileEdits() {
  if (!profileData) return;
  var p = profileData;
  var newName  = (document.getElementById("newNameInput").value || "").trim();
  var newPhone = (document.getElementById("profilePhone").value || "").trim();
  var reason   = (document.getElementById("profileEditReason").value || "").trim();
  var newGroups = [];
  ["Choir","Band","Orchestra"].forEach(function (g) { var el = document.getElementById("tf" + g); if (el && el.checked) newGroups.push(g); });

  var d = p.details || {};
  var newFaculty = (document.getElementById("profFaculty") || {}).value || "";
  var newCourse  = ((document.getElementById("profCourse") || {}).value || "").trim();
  var newYear    = (document.getElementById("profYear") || {}).value || "";

  var curGroups = (p.groups || []).slice().sort().join(",");
  var nameChanged   = newName && newName !== (p.name || userName);
  var phoneChanged  = newPhone !== (p.phone || "");
  var groupsChanged = newGroups.slice().sort().join(",") !== curGroups;
  var courseChanged = newFaculty !== (d.courseFaculty || "") || newCourse !== (d.courseName || "") || newYear !== (d.yearOfStudy || "");

  if (!nameChanged && !phoneChanged && !groupsChanged && !courseChanged) { showToast("Nothing changed.", "error"); return; }
  if (groupsChanged && newGroups.length === 0) { showToast("Pick at least one section.", "error"); return; }
  if ((nameChanged || groupsChanged || courseChanged) && !reason) { showToast("Add a reason — name, section and academic changes need admin approval.", "error"); return; }

  var btn = document.getElementById("btnSaveProfile");
  btn.disabled = true; btn.textContent = "Saving…";
  var pendingBits = [], doneCount = 0, total = (phoneChanged ? 1 : 0) + (nameChanged ? 1 : 0) + (groupsChanged ? 1 : 0) + (courseChanged ? 1 : 0);

  function finishOne() {
    doneCount++;
    if (doneCount < total) return;
    profilePendingMsg = pendingBits.length
      ? pendingBits.join(" · ") + " — awaiting admin approval."
      : "";
    profileMode = "view";
    renderProfile();
    showToast("Profile saved." + (pendingBits.length ? " Requests sent for approval." : ""), "success");
  }
  function fail(e) { btn.disabled = false; btn.textContent = "Save changes"; showToast("Failed: " + e.message, "error"); }

  if (phoneChanged) {
    google.script.run.withSuccessHandler(function () { profileData.phone = newPhone; finishOne(); })
      .withFailureHandler(fail).updateMyPhone(newPhone);
  }
  if (nameChanged) {
    pendingBits.push("Name change to <b>" + esc(newName) + "</b>");
    google.script.run.withSuccessHandler(finishOne).withFailureHandler(fail)
      .requestNameChange(newName, reason);
  }
  if (groupsChanged) {
    pendingBits.push("Transfer to <b>" + newGroups.join(" · ") + "</b>");
    google.script.run.withSuccessHandler(finishOne).withFailureHandler(fail)
      .requestSectionTransfer(newGroups, reason);
  }
  if (courseChanged) {
    pendingBits.push("Academic details update");
    google.script.run.withSuccessHandler(finishOne).withFailureHandler(fail)
      .requestCourseDetailsChange({ courseFaculty: newFaculty, courseName: newCourse, yearOfStudy: newYear }, reason);
  }
}

  var k = Object.keys(g).sort(function (a, b) {
    return a === "Other" ? 1 : b === "Other" ? -1 : a.localeCompare(b);

  var res = [];
  for (var j = 0; j < k.length; j++) res.push({ role: k[j], members: g[k[j]] });

function switchTab(tab) {
  activeTab = tab;
  // Editing state (View & Edit / Sessions) must not leak into other tabs.
  if (tab !== "view" && tab !== "sessions") { hideChangesBar(); }
  if (tab !== "sessions") { sessDetailActive = false; }
  // Apology is a sub-page of My attendance — keep "My attendance" lit in the nav.
  var navTab = (tab === "apology") ? "myatt" : tab;
  // Mobile tab buttons (primary + optional "More")
  var mBtns = document.querySelectorAll(".tab-nav button");
  for (var i = 0; i < mBtns.length; i++) {
    var b = mBtns[i];
    if (b.getAttribute("data-more")) b.className = (moreTabIds.indexOf(navTab) !== -1) ? "active" : "";
    else b.className = (b.getAttribute("data-tab") === navTab) ? "active" : "";
  }
  // Sidebar items (matched by data-tab, not index)
  var sBtns = document.querySelectorAll("#sidebarNav .nav-item, #sidebarNavPersonal .nav-item");
  for (var j = 0; j < sBtns.length; j++) sBtns[j].className = "nav-item" + (sBtns[j].getAttribute("data-tab") === navTab ? " active" : "");

  // Hide all tab pages
  var allPages = ["record", "sessions", "dashboard", "probation", "requests", "view", "members", "communique", "birthdays", "myatt", "scoreboard-member", "apology", "profile"];
  for (var p = 0; p < allPages.length; p++) {
    var el = document.getElementById("tab-" + allPages[p]);
    if (el) el.className = "tab-page";
  }
  document.getElementById("tab-" + tab).className = "tab-page active";

  // Submit area visibility (Record tab only)
  var sa = document.getElementById("submitArea");
  if (sa) {
    if (tab !== "record") sa.style.display = "none";
    else if (members.length > 0) sa.style.display = "block";
  }

  if (tab === "communique"        && !communiqueLoaded) loadCommunique();
  if (tab === "birthdays"         && !birthdaysLoaded)  loadBirthdays();
  if (tab === "view"              && !viewInitialized)  initViewTab();
  if (tab === "sessions"          && !sessionsLoaded && typeof loadSessions === "function")        { sessionsLoaded = true; loadSessions(); }
  if (tab === "dashboard"         && !dashboardLoaded && typeof loadGroupDashboard === "function") { dashboardLoaded = true; loadGroupDashboard(); }
  if (tab === "probation"         && !probationTabLoaded) initProbationTab();
  if (tab === "requests"          && !requestsTabLoaded)  initRequestsTab();
  if (tab === "myatt"             && !myAttLoaded)     loadMyAttendance();
  if (tab === "scoreboard-member" && !memberSbLoaded)  loadMemberScoreboard();
  if (tab === "apology"           && !apologyLoaded)   loadApologyTab();
  if (tab === "members"           && (!memberListData || memberListData.length === 0)) refreshMemberList();
  if (tab === "profile")          { profileMode = "view"; loadProfile(); }
}

var probationTabLoaded = false, requestsTabLoaded = false; // sessionsLoaded + dashboardLoaded are declared in the Sessions/Dashboard LOGIC block below
var membersMemberInit = false, membersScoreboardInit = false;

function sessToggleCustom() {
