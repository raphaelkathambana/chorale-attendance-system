var communiqueLoaded=false, communiqueData={recipientType:"all"};

function loadCommunique(){
  communiqueLoaded=true;
  var c=document.getElementById("communiqueContent");
  if(!c)return;
  c.innerHTML='<div class="loading"><div class="spinner"></div><p>Loading…</p></div>';
  google.script.run.withSuccessHandler(function(opts){
    communiqueData.options=opts;
    renderCommunique();
  }).withFailureHandler(function(e){c.innerHTML='<p class="loading">Error: '+esc(e.message)+'</p>';}).getCommuniqueRecipientOptions();
}

function renderCommunique(){
  var c=document.getElementById("communiqueContent");if(!c)return;
  var opts=communiqueData.options||{groups:[],members:[],signatures:[]};
  var h='';

  // Subject
  h+='<div class="form-group"><label class="form-label">Subject *</label><input type="text" id="commSubject" class="form-input" placeholder="What is this message about?" oninput="renderCommuniquePreview()"></div>';

  // Body
  h+='<div class="form-group"><label class="form-label">Message *</label><textarea id="commBody" class="form-input" rows="8" placeholder="Type your message here. Leave a blank line between paragraphs." oninput="renderCommuniquePreview()"></textarea></div>';

  // Signature
  h+='<div class="form-group"><label class="form-label">Sign as</label><select id="commSignature" class="form-input" onchange="renderCommuniquePreview()">';
  for(var s=0;s<opts.signatures.length;s++)h+='<option value="'+esc(opts.signatures[s].key)+'">'+esc(opts.signatures[s].label)+'</option>';
  h+='</select></div>';

  // Recipient type
  h+='<div class="form-group"><label class="form-label">Send to</label>';
  h+='<div class="checkbox-row" style="flex-direction:column;align-items:stretch;gap:6px">';
  h+='<label class="checkbox-label"><input type="radio" name="commRecip" value="all" checked onchange="onCommRecipChange()"> All active members</label>';
  h+='<label class="checkbox-label"><input type="radio" name="commRecip" value="groups" onchange="onCommRecipChange()"> Specific sections</label>';
  h+='<label class="checkbox-label"><input type="radio" name="commRecip" value="individuals" onchange="onCommRecipChange()"> Specific members</label>';
  h+='<label class="checkbox-label"><input type="radio" name="commRecip" value="admins" onchange="onCommRecipChange()"> Admins only</label>';
  h+='</div></div>';

  // Group selector (hidden unless groups chosen)
  h+='<div class="form-group" id="commGroupSelect" style="display:none"><label class="form-label">Sections</label><div class="checkbox-row">';
  for(var g=0;g<opts.groups.length;g++)h+='<label class="checkbox-label"><input type="checkbox" class="commGroup" value="'+esc(opts.groups[g])+'" onchange="renderCommuniquePreview()"> '+esc(opts.groups[g])+'</label>';
  h+='</div></div>';

  // Individual selector (hidden unless individuals chosen)
  h+='<div class="form-group" id="commMemberSelect" style="display:none"><label class="form-label">Members</label>';
  h+='<input type="text" id="commMemberSearch" class="form-input" placeholder="Search members..." oninput="renderCommMemberList()" style="margin-bottom:8px">';
  h+='<div id="commMemberList" style="max-height:240px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px"></div></div>';

  // CC admins
  h+='<label class="checkbox-label" style="margin-bottom:12px"><input type="checkbox" id="commCcAdmins" onchange="renderCommuniquePreview()"> CC admins on this message</label>';

  // Send
  h+='<button class="btn-primary" id="btnSendComm" onclick="sendCommunique()">Send Message</button>';

  c.innerHTML=h;
  renderCommuniquePreview();
}

function onCommRecipChange(){
  var val=document.querySelector('input[name="commRecip"]:checked').value;
  communiqueData.recipientType=val;
  document.getElementById("commGroupSelect").style.display=val==="groups"?"block":"none";
  document.getElementById("commMemberSelect").style.display=val==="individuals"?"block":"none";
  if(val==="individuals")renderCommMemberList();
  renderCommuniquePreview();
}

function renderCommMemberList(){
  var list=document.getElementById("commMemberList");if(!list)return;
  // Capture currently-checked emails before re-rendering (so search/clear doesn't lose them)
  captureCommSelections();
  if(!communiqueData.selected)communiqueData.selected={};
  var search=(document.getElementById("commMemberSearch")||{}).value||"";
  var s=search.toLowerCase();
  var members=(communiqueData.options&&communiqueData.options.members)||[];
  var h='';
  for(var i=0;i<members.length;i++){
    var m=members[i];
    if(s&&m.name.toLowerCase().indexOf(s)===-1)continue;
    var checked=communiqueData.selected[m.email]?" checked":"";
    h+='<label class="checkbox-label" style="display:flex;width:100%;border:none;padding:4px 0"><input type="checkbox" class="commMember" value="'+esc(m.email)+'"'+checked+' onchange="onCommMemberToggle(this)"> '+esc(m.name)+' <span style="color:var(--text-muted);font-size:.8rem;margin-left:6px">'+esc(m.groups.join(", "))+'</span></label>';
  }
  var count=Object.keys(communiqueData.selected).filter(function(k){return communiqueData.selected[k];}).length;
  var countNote=count>0?'<p style="font-size:.8rem;color:var(--primary);margin:0 0 6px">'+count+' selected</p>':'';
  list.innerHTML=countNote+(h||'<p style="color:var(--text-muted);font-size:.85rem">No members found.</p>');
}

// Record the checked state of currently-visible checkboxes into the persistent set
function captureCommSelections(){
  if(!communiqueData.selected)communiqueData.selected={};
  var boxes=document.querySelectorAll(".commMember");
  for(var i=0;i<boxes.length;i++){
    communiqueData.selected[boxes[i].value]=boxes[i].checked;
  }
}

function onCommMemberToggle(cb){
  if(!communiqueData.selected)communiqueData.selected={};
  communiqueData.selected[cb.value]=cb.checked;
  renderCommuniquePreview();
}

// All currently-selected member emails (from the persistent set)
function selectedCommMembers(){
  captureCommSelections();
  if(!communiqueData.selected)return [];
  return Object.keys(communiqueData.selected).filter(function(k){return communiqueData.selected[k];});
}

// Live letterhead preview — mirrors EmailLayout.html, updates as the admin types
function renderCommuniquePreview(){
  var c=document.getElementById("communiquePreview");if(!c)return;
  var subjEl=document.getElementById("commSubject");
  if(!subjEl){c.innerHTML='<div class="empty-pane">Live letterhead preview will show here.</div>';return;}
  var subject=(subjEl.value||"").trim();
  var body=(document.getElementById("commBody").value||"").trim();
  var sigSel=document.getElementById("commSignature");
  var sigLabel=sigSel&&sigSel.options.length?sigSel.options[sigSel.selectedIndex].text:"The Strathmore Chorale";
  var sigParts=sigLabel.split("·");
  var sigName=(sigParts[0]||sigLabel).trim();
  var sigRole=(sigParts[1]||"").trim();

  // Recipient summary
  var rtype=communiqueData.recipientType||"all";
  var rec="";
  if(rtype==="all")rec="All active members";
  else if(rtype==="admins")rec="Admins only";
  else if(rtype==="groups"){
    var gs=[];document.querySelectorAll(".commGroup:checked").forEach(function(cb){gs.push(cb.value);});
    rec=gs.length?gs.join(", ")+" section"+(gs.length>1?"s":""):"No sections chosen yet";
  } else if(rtype==="individuals"){
    var ms=selectedCommMembers();
    rec=ms.length?ms.length+" member"+(ms.length>1?"s":"")+" chosen":"No members chosen yet";
  }
  if(document.getElementById("commCcAdmins")&&document.getElementById("commCcAdmins").checked)rec+=" · cc admins";

  // Body paragraphs (blank-line separated)
  var paras=body?body.split(/\n\s*\n/).map(function(p){
    return '<p style="margin:0 0 12px;font-size:11.5px;line-height:1.6;color:var(--ink-700)">'+esc(p).replace(/\n/g,"<br>")+'</p>';
  }).join(""):'<p style="margin:0;font-size:11.5px;line-height:1.6;color:var(--ink-400);font-style:italic">Your message will appear here, on the letterhead, exactly as members will read it.</p>';

  var h='<div class="cp-frame">'
    + '<div class="cp-bar"><span class="form-label">Live letterhead preview</span><span class="cp-file">EmailLayout.html</span></div>'
    + '<div class="cp-recipients"><b>TO</b> '+esc(rec)+'</div>'
    + '<div class="cp-sheet">'
    +   '<div style="height:3px;background:linear-gradient(90deg,var(--gold-700),var(--gold),var(--gold-300))"></div>'
    +   '<div style="background:var(--ink);padding:18px 20px 16px">'
    +     '<div style="display:flex;justify-content:space-between;align-items:baseline">'
    +       '<span style="font-family:var(--f-mono);font-size:8.5px;letter-spacing:.22em;color:var(--gold-300);text-transform:uppercase">Strathmore Chorale</span>'
    +       '<span style="font-family:var(--f-mono);font-size:8.5px;letter-spacing:.22em;color:var(--ink-400);text-transform:uppercase">MMXXVI</span>'
    +     '</div>'
    +     '<div style="width:24px;height:2px;background:var(--gold);margin:10px 0"></div>'
    +     '<div class="display" style="font-size:21px;line-height:1.12;color:var(--paper)">'+(esc(subject)||'<span style="color:var(--ink-400)">Your subject line</span>')+'</div>'
    +   '</div>'
    +   '<div style="background:#fff;padding:18px 20px 6px">'+paras+'</div>'
    +   '<div style="background:#fff;padding:0 20px 18px">'
    +     '<div style="border-top:1px solid var(--paper-200);margin-bottom:12px"></div>'
    +     '<div style="font-size:11px;color:var(--ink-700);margin-bottom:2px">Warm regards,</div>'
    +     '<div style="font-family:var(--f-display);font-style:italic;font-size:15px;color:var(--ink)">'+esc(sigName)+'</div>'
    +     (sigRole?'<div style="font-family:var(--f-mono);font-size:8.5px;letter-spacing:.16em;color:var(--ink-400);text-transform:uppercase;margin-top:2px">'+esc(sigRole)+'</div>':'')
    +   '</div>'
    +   '<div style="background:var(--paper);border-top:1px solid var(--paper-200);padding:14px 20px;text-align:center">'
    +     '<div style="font-family:var(--f-display);font-style:italic;font-size:12.5px;color:var(--ink)">One voice from many.</div>'
    +     '<div style="font-family:var(--f-mono);font-size:8px;letter-spacing:.24em;color:var(--ink-400);text-transform:uppercase;margin-top:4px">Strathmore · Nairobi</div>'
    +   '</div>'
    + '</div></div>';
  c.innerHTML=h;
}

function sendCommunique(){
  var subject=document.getElementById("commSubject").value.trim();
  var body=document.getElementById("commBody").value.trim();
  if(!subject){showToast("Subject is required.","error");return;}
  if(!body){showToast("Message is required.","error");return;}

  var rtype=communiqueData.recipientType||"all";
  var payload={subject:subject,body:body,signatureKey:document.getElementById("commSignature").value,recipientType:rtype,ccAdmins:document.getElementById("commCcAdmins").checked};

  if(rtype==="groups"){
    var groups=[];document.querySelectorAll(".commGroup:checked").forEach(function(cb){groups.push(cb.value);});
    if(groups.length===0){showToast("Select at least one section.","error");return;}
    payload.groups=groups;
  } else if(rtype==="individuals"){
    var emails=selectedCommMembers();
    if(emails.length===0){showToast("Select at least one member.","error");return;}
    payload.emails=emails;
  }

  if(!confirm("Send this message? It will go out with the letterhead to the selected recipients."))return;
  var btn=document.getElementById("btnSendComm");btn.disabled=true;btn.textContent="Sending...";
  google.script.run.withSuccessHandler(function(r){
    btn.disabled=false;btn.textContent="Send Message";
    showToast("Message sent to "+r.count+" recipient(s).","success");
    document.getElementById("commSubject").value="";document.getElementById("commBody").value="";
  }).withFailureHandler(function(e){btn.disabled=false;btn.textContent="Send Message";showToast("Failed: "+e.message,"error");
  }).sendCommunique(payload);
}


// ═══════════════════════════════════════════════════════════════════════════
//  BIRTHDAYS (admin) — getBirthdayDashboard / sendCustomBirthdayCard /
//  makeBirthdayPoster. Per-person accent is read from the backend, never
//  hardcoded; cards mirror the in-app banner's accent language.
// ═══════════════════════════════════════════════════════════════════════════
var birthdaysLoaded = false, birthdayRange = "today", birthdayData = null, bdayPeople = {};

function loadBirthdays() { birthdaysLoaded = true; fetchBirthdays(); }

function fetchBirthdays() {
  var c = document.getElementById("birthdaysContent");
  if (!c) return;
  c.innerHTML = '<div class="loading"><div class="spinner"></div><div>Loading birthdays…</div></div>';
  google.script.run.withSuccessHandler(function (d) {
    birthdayData = d || {};
    renderBirthdays();
  }).withFailureHandler(function (e) {
    c.innerHTML = '<p class="bday-empty">Could not load birthdays: ' + esc(e.message) + '</p>';
  }).getBirthdayDashboard(birthdayRange);
}

function setBirthdayRange(mode) {
  if (mode === birthdayRange) return;
  birthdayRange = mode;
  fetchBirthdays();
}

function bpid(email) { return "bp-" + String(email || "").replace(/[^a-z0-9]/gi, "_"); }

// Birthday month+day, derived from daysAway (today + N days). Returns e.g. "25 Jun".
function bdayDateLabel(daysAway) {
  if (daysAway == null || isNaN(daysAway)) return "";
  var d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + Number(daysAway));
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return d.getDate() + " " + months[d.getMonth()];
}

function renderBirthdays() {
  var c = document.getElementById("birthdaysContent");
  if (!c) return;
  var d = birthdayData || {};
  var autoSend = !!d.autoSend;
  bdayPeople = {};

  var ranges = [
    { id: "today", label: "Today / Tomorrow" },
    { id: "week",  label: "This Week" },
    { id: "month", label: "This Month" }
  ];
  var html = '<div class="bday-range">';
  for (var i = 0; i < ranges.length; i++) {
    html += '<button class="bday-range__opt' + (ranges[i].id === birthdayRange ? ' active' : '') +
            '" onclick="setBirthdayRange(\'' + ranges[i].id + '\')">' + ranges[i].label + '</button>';
  }
  html += '</div>';

  // Auto-send setting toggle
  html += '<div class="bday-setting">' +
            '<div class="bday-setting__copy">' +
              '<div class="bday-setting__label">Send birthday cards automatically</div>' +
              '<div class="bday-setting__hint">' + (autoSend
                ? 'On — each member gets their card on the day, no action needed.'
                : 'Off — review and send each card yourself.') + '</div>' +
            '</div>' +
            '<button class="bswitch" role="switch" aria-checked="' + (autoSend ? 'true' : 'false') + '" ' +
              'aria-label="Send birthday cards automatically" onclick="toggleAutoSend(this)"></button>' +
          '</div>';

  var today = d.today || [], tomorrow = d.tomorrow || [], upcoming = d.upcoming || [];
  var total = today.length + tomorrow.length + upcoming.length;

  if (!total) {
    html += '<div class="bday-empty">No birthdays in this range. Check back soon — someone\u2019s always about to celebrate.</div>';
  } else {
    // Today and Tomorrow always shown prominently (even when empty, as a quiet line)
    html += renderBdaySection("Today", today, autoSend, true);
    html += renderBdaySection("Tomorrow", tomorrow, autoSend, true);
    // Upcoming only appears in week/month mode
    if (birthdayRange !== "today") html += renderBdaySection("Upcoming", upcoming, autoSend, false);
  }
  c.innerHTML = html;
}

function renderBdaySection(title, list, autoSend, prominent) {
  list = list || [];
  if (!list.length) {
    if (!prominent) return "";
    return '<div class="bday-section"><div class="bday-section__head">' +
             '<span class="bday-section__title">' + title + '</span></div>' +
           '<p class="bday-quiet">No one\u2019s celebrating ' + title.toLowerCase() + '.</p></div>';
  }
  var cards = "";
  for (var i = 0; i < list.length; i++) cards += renderBpersonCard(list[i], autoSend);
  var noun = list.length === 1 ? "person" : "people";
  return '<div class="bday-section"><div class="bday-section__head">' +
           '<span class="bday-section__title">' + title + '</span>' +
           '<span class="bday-section__count">' + list.length + ' ' + noun + '</span>' +
         '</div><div class="bday-cards">' + cards + '</div></div>';
}

function renderBpersonCard(p, autoSend) {
  var id = bpid(p.email);
  bdayPeople[id] = p;

  var avatar = p.avatar
    ? '<img class="bperson__avatar" src="' + p.avatar + '" alt="">'
    : '<span class="bperson__avatar bperson__avatar--initial">' + esc(p.first ? p.first.charAt(0) : "\u266A") + '</span>';

  var ageTxt = (p.age != null && p.age !== "") ? "Turns " + esc(String(p.age)) : "Birthday";
  var dateTxt = bdayDateLabel(p.daysAway);
  var ageLine = dateTxt ? (ageTxt + ' \u00b7 ' + dateTxt) : ageTxt;
  var sent = p.cardSent ? '<span class="bperson__sent">\u2713 Card sent</span>' : "";

  var copyBtn   = '';
  var posterBtn = '<button class="btn btn-ghost" onclick="makeBdayPoster(\'' + id + '\', this)">Make poster</button>';

  var actions;
  if (autoSend) {
    actions = '<div class="bperson__auto">\u2713 Sent automatically</div>' +
              '<div class="bperson__actions">' + posterBtn + '</div>';
  } else {
    actions = '<div class="bperson__actions">' +
                '<button class="bbtn bbtn--accent" onclick="sendBdayCardNow(\'' + id + '\', this)">Send card</button>' +
                '<button class="btn btn-secondary" onclick="openBdayEdit(\'' + id + '\')">Edit &amp; send</button>' +
                posterBtn +
              '</div>';
  }

  var edit = '<div class="bperson__edit">' +
               '<label class="form-label" for="' + id + '-msg">Card message</label>' +
               '<textarea class="bperson__msg" id="' + id + '-msg">' + esc(p.messageDraft || "") + '</textarea>' +
               '<div class="bperson__edit-actions">' +
                 '<button class="bbtn bbtn--accent" onclick="sendBdayCard(\'' + id + '\')">Send card</button>' +
                 '<button class="btn btn-ghost" onclick="closeBdayEdit(\'' + id + '\')">Cancel</button>' +
               '</div>' +
             '</div>';

  var accent = p.accent || "var(--gold)";
  var group = '<div class="bperson__group">' +
                '<label class="form-label" for="' + id + '-group">Group message (WhatsApp)</label>' +
                '<div class="bperson__group-row">' +
                  '<textarea class="bperson__group-ta" id="' + id + '-group">' + esc(p.groupDraft || "") + '</textarea>' +
                  '<button class="bbtn bbtn--accent" onclick="copyBdayGroup(\'' + id + '\')">Copy</button>' +
                '</div>' +
              '</div>';
  return '<div class="bperson" id="' + id + '" style="--accent:' + accent + ';">' +
           '<div class="bperson__top">' + avatar +
             '<div class="bperson__id">' +
               '<div class="bperson__name">' + esc(p.name) + '</div>' +
               '<div class="bperson__age">' + ageLine + '</div>' +
             '</div>' + sent +
           '</div>' + actions + edit + group +
         '</div>';
}

function openBdayEdit(id) {
  var el = document.getElementById(id);
  if (el) el.classList.add("editing");
  var ta = document.getElementById(id + "-msg");
  if (ta) ta.focus();
}
function closeBdayEdit(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove("editing");
}

function sendBdayCard(id) {
  var p = bdayPeople[id];
  if (!p) return;
  var ta = document.getElementById(id + "-msg");
  var msg = ta ? ta.value : (p.messageDraft || "");
  var card = document.getElementById(id);
  var btn = card ? card.querySelector(".bperson__edit .bbtn--accent") : null;
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  google.script.run.withSuccessHandler(function (res) {
    p.cardSent = true; p.messageDraft = msg;
    showToast("Card sent to " + ((res && res.name) || p.first || "member") + ".", "success");
    renderBirthdays();
  }).withFailureHandler(function (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Send card"; }
    showToast("Failed: " + e.message, "error");
  }).sendCustomBirthdayCard(p.email, msg);
}

function copyBdayGroup(id) {
  var ta = document.getElementById(id + "-group");
  var text = ta ? ta.value : ((bdayPeople[id] || {}).groupDraft || "");
  copyTextToClipboard(text, function (ok) {
    showToast(ok ? "Group message copied — paste it into WhatsApp." : "Couldn\u2019t copy. Select and copy manually.", ok ? "success" : "error");
  });
}

// Default (un-edited) card send — distinct from the edited path (sendCustomBirthdayCard)
function sendBdayCardNow(id, btn) {
  var p = bdayPeople[id];
  if (!p) return;
  if (btn) { btn.disabled = true; btn.textContent = "Sending…"; }
  google.script.run.withSuccessHandler(function (res) {
    p.cardSent = true;
    showToast("Card sent to " + ((res && res.name) || p.first || "member") + ".", "success");
    renderBirthdays();
  }).withFailureHandler(function (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Send card"; }
    showToast("Failed: " + e.message, "error");
  }).sendBirthdayCardNow(p.email);
}

// Auto-send setting — optimistic UI, reverts on failure, re-renders cards to swap states
function toggleAutoSend(el) {
  var next = el.getAttribute("aria-checked") !== "true";
  el.disabled = true;
  google.script.run.withSuccessHandler(function () {
    el.disabled = false;
    if (birthdayData) birthdayData.autoSend = next;
    showToast(next ? "Birthday cards will send automatically." : "Automatic sending turned off.", "success");
    renderBirthdays();
  }).withFailureHandler(function (e) {
    el.disabled = false;
    showToast("Couldn\u2019t update setting: " + e.message, "error");
  }).setAutoSendBirthdayCard(next);
}

function makeBdayPoster(id, btn) {
  var p = bdayPeople[id];
  if (!p) return;
  var orig = btn ? btn.textContent : "";
  if (btn) { btn.disabled = true; btn.textContent = "Making…"; }
  google.script.run.withSuccessHandler(function (res) {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
    if (res && res.url) {
      window.open(res.url, "_blank");
      showToast("Poster ready for " + ((res.name) || p.first) + ".", "success");
    } else {
      showToast("Poster could not be generated.", "error");
    }
  }).withFailureHandler(function (e) {
    if (btn) { btn.disabled = false; btn.textContent = orig; }
    showToast(e.message || "No poster template configured yet.", "error");
  }).makeBirthdayPoster(p.email);
}

function copyTextToClipboard(text, cb) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function () { cb(true); }, function () { fallbackCopy(text, cb); });
    return;
  }
  fallbackCopy(text, cb);
}
function fallbackCopy(text, cb) {
  try {
    var ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.top = "-1000px"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.focus(); ta.select();
    var ok = document.execCommand("copy");
    document.body.removeChild(ta);
    cb(ok);
  } catch (e) { cb(false); }
}
</script>
